function audio(){ if(!AC){ AC = new (window.AudioContext||window.webkitAudioContext)(); startMusic(); } if(AC.state==='suspended') AC.resume(); }
function beep(freq, dur, type='square', vol=0.08, slide=0){
  if(!AC || !sfxOn) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
}

const BASS   = [131,0,131,0,165,0,165,0, 147,0,147,0,110,0,123,0];
function startMusic(){
  if(musicTimer) return;

    if(!musicOn || !AC || state==='MENU') return;

function bindTouch(id, key){
  const el = document.getElementById(id);
  const on = e=>{ e.preventDefault(); audio(); keys[key]=true; if(key==='space') handleUIKey(' '); };

function loadScores(){

function saveScoreIfHigh(finalScore){
  if(scoreSaved) return; scoreSaved = true;
  try{
    let list = loadScores();
    if(list.length<5 || finalScore>list[list.length-1].score){
      let name = 'BALDO';
      try{ const p = window.prompt('Nuovo record! Il tuo nome (max 8 lettere):','BALDO'); if(p) name=p.slice(0,8).toUpperCase(); }catch(e){}

      list.sort((a,b)=>b.score-a.score);
      list = list.slice(0,5);
      localStorage.setItem('superbaldo_scores', JSON.stringify(list));
    }
  }catch(e){}
}

function buildWorld(idx){
  const L = LEVELS[idx];
  const rows = L.rows.map(r=>r.split(''));
  const w = Math.max(...rows.map(r=>r.length));
  const ents = []; let start = {x:2,y:2}; let flag = null; let boss = null; let totalCoins = 0;
  for(let y=0;y<rows.length;y++) for(let x=0;x<w;x++){
    const ch = rows[y][x]||' ';
    if(ch==='P'){ start={x,y}; rows[y][x]=' '; }
    if(ch==='F'){ flag={x,y}; rows[y][x]=' '; }
    if(ch==='c'){ totalCoins++; }
    if('esfjr'.includes(ch)){ ents.push(makeEnemy(ch,x,y)); rows[y][x]=' '; }
    if(ch==='G'){ boss = makeBoss(x,y,L.bossKind); ents.push(boss); rows[y][x]=' '; }
  }
  return { rows, w, h:rows.length, ents, start, flag, boss, totalCoins,
           fireballs:[], items:[], warnings:[], cfg:L };
}

function makeEnemy(ch,x,y){
  const base = { x:x*TILE, y:y*TILE, w:30, h:30, vx:-1.1, vy:0, dead:0, type:ch, t:Math.random()*99 };
  if(ch==='s'){ base.w=32; base.h=26; base.vx=-0.8; }
  if(ch==='f'){ base.fly=true; base.baseY=y*TILE; base.vx=-1.4; }
  if(ch==='j'){ base.vx=0; base.jumpT=60+Math.random()*40; base.homeX=x*TILE; }
  if(ch==='r'){ base.vx=0; base.jumpT=50+Math.random()*30; base.homeX=x*TILE; base.w=28; base.h=26; }
  return base;
}

function stompScore(target,baseScore){
  player.combo = (player.combo||0) + 1;
  const mult = Math.min(player.combo, 8);
  addScore(baseScore*mult, target.x, target.y);
  if(mult>1){ floatText(target.x, target.y-20, 'COMBO x'+mult+'!', '#ff9de0'); SFX.power(); }
}

/* ============================= FISICA ============================= */
const GRAV = 0.55, MAXFALL = 13;
function rectVsTiles(e, cb){
  const x0 = Math.floor(e.x/TILE), x1 = Math.floor((e.x+e.w-0.01)/TILE);
  const y0 = Math.floor(e.y/TILE), y1 = Math.floor((e.y+e.h-0.01)/TILE);
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++) cb(tx,ty,tileAt(world,tx,ty));
}
function moveEntity(e, oneway=false){
  // orizzontale
  e.x += e.vx;
  rectVsTiles(e,(tx,ty,ch)=>{
    if(SOLID(ch)){
      if(e.vx>0){ e.x = tx*TILE - e.w; } else if(e.vx<0){ e.x = (tx+1)*TILE; }
      e.hitWall = true;
    }
  });
  // verticale
  e.onGround = false;
  const prevBottom = e.y + e.h;
  e.y += e.vy;
  rectVsTiles(e,(tx,ty,ch)=>{
    if(SOLID(ch)){
      if(e.vy>0){ e.y = ty*TILE - e.h; e.vy=0; e.onGround=true; }
      else if(e.vy<0){ e.y = (ty+1)*TILE; e.vy=0; e.bumped={tx,ty,ch}; }
    } else if(oneway && ch==='=' && e.vy>0){
      const top = ty*TILE;
      if(prevBottom <= top+1 && e.y+e.h > top){ e.y = top - e.h; e.vy=0; e.onGround=true; }
    }
  });
}
const overlap = (a,b)=> a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

/* ============================= BLOCCHI ============================= */
function hitBlock(tx,ty,ch){
  const px = tx*TILE+TILE/2, py = ty*TILE;
  if(ch==='?'){
    world.rows[ty][tx]='X'; SFX.coin(); coins++; addScore(100,px,py);
    puff(px,py,'#ffd94a',10);
    if(coins>=50){ coins-=50; lives++; SFX.power(); floatText(px,py-20,'1UP!','#7dff8a'); }
  } else if(ch==='M'){
    world.rows[ty][tx]='X'; SFX.power();
    const pool = ['bacca','fiamma','ghiaccio','piuma','stella','scudo'];
    const kind = pool[Math.floor(Math.random()*pool.length)];
    world.items.push({ x:tx*TILE+4, y:ty*TILE-30, w:28, h:28, vx:1.2, vy:-3, kind });
    puff(px,py,'#ff9de0',10);
  } else if(ch==='B'){
    const canBreak = player.big || player.c.name==='BRONTOLO';
    if(canBreak){ world.rows[ty][tx]=' '; SFX.brick(); addScore(50,px,py);
      puff(px,py,'#b5793d',14,4); shake=6; }
    else SFX.bump();
  } else SFX.bump();
}

/* ============================= POWER-UP ============================= */
const ITEM_INFO = {
  bacca:{ col:'#ff4d6d', label:'BACCA GIGANTE' },
  fiamma:{ col:'#ff9f1c', label:'FIAMMA' },
  ghiaccio:{ col:'#9ae6ff', label:'BACCA GHIACCIO' },
  piuma:{ col:'#4cc9f0', label:'PIUMA DOPPIA' },
  stella:{ col:'#ffd60a', label:'SUPER STELLA' },
  scudo:{ col:'#57e389', label:'SCUDO' },
};
function applyItem(kind){
  SFX.power(); addScore(500,player.x,player.y-10);
  floatText(player.x, player.y-26, ITEM_INFO[kind].label, ITEM_INFO[kind].col);
  if(kind==='bacca'){ if(!player.big){ player.big=true; player.h=44; player.y-=12; } }
  if(kind==='fiamma') player.flame = true;
  if(kind==='ghiaccio') player.ice = true;
  if(kind==='piuma') player.feather = true;
  if(kind==='stella'){ player.star = 8*60; }
  if(kind==='scudo'){ player.shield = true; SFX.shield(); }
}
function hurtPlayer(){
  if(player.inv>0 || player.star>0 || player.dead) return;
  if(player.shield){ player.shield=false; SFX.shield(); player.inv=90; puff(player.x+13,player.y+16,'#57e389',12); return; }
  if(player.flame){ player.flame=false; SFX.hurt(); player.inv=90; return; }
  if(player.ice){ player.ice=false; SFX.hurt(); player.inv=90; return; }
  if(player.big){ player.big=false; player.h=32; SFX.hurt(); player.inv=90; return; }
  if(player.extraHits>0){ player.extraHits--; SFX.hurt(); player.inv=90; return; }
  killPlayer();
}
function killPlayer(){
  if(player.dead) return;
  player.dead=true; player.deadT=0; player.vy=-11; SFX.die(); shake=10;
}

/* ============================= UPDATE ============================= */
function updatePlayer(){
  const p = player, c = p.c;
  if(p.dead){
    p.deadT++; p.vy += GRAV; p.y += p.vy;
    if(p.deadT>110){
      lives--;
      if(lives<0){ state='GAMEOVER'; saveScoreIfHigh(score); }
      else { p.big=false; p.flame=false; p.feather=false; p.shield=false;
             p.extraHits=c.hits; spawnPlayer(); player.inv=90; }
    }
    return;
  }
  // corsa
  const acc = 0.85*c.speed, maxV = 6.6*c.speed;
  if(left()){ p.vx -= acc; p.face=-1; } else if(right()){ p.vx += acc; p.face=1; }
  else p.vx *= p.onGround ? 0.78 : 0.94;
  p.vx = Math.max(-maxV, Math.min(maxV, p.vx));
  // salto: coyote time + buffer
  p.coyote = p.onGround ? 7 : Math.max(0,p.coyote-1);
  p.jbuf = jumpK() ? (p.jbufHeld ? p.jbuf : 7) : 0;
  if(jumpK() && !p.jbufHeld){
    if(p.coyote>0){ p.vy = -13.6*c.jump; p.jumps=1; SFX.jump(); puff(p.x+13,p.y+p.h,'#fff',5,2); }
    else if(p.feather && p.jumps===1){ p.vy = -12.0*c.jump; p.jumps=2; SFX.jump2(); puff(p.x+13,p.y+p.h,'#4cc9f0',8,2); }
  }
  p.jbufHeld = jumpK();
  if(!jumpK() && p.vy < -6.5) p.vy = -6.5; // salto variabile (con minimo dignitoso)
  p.vy = Math.min(MAXFALL, p.vy + GRAV);
  // picchiata (ground pound)
  if(downK() && !p.onGround && !p.pounding && !p.dead){ p.pounding=true; SFX.stomp(); }
  if(p.pounding) p.vy = 17;
  // fuoco / ghiaccio
  p.fireCd = Math.max(0,p.fireCd-1);
  if((p.flame||p.ice) && fireK() && p.fireCd===0){
    p.fireCd = 22; SFX.fire();
    world.fireballs.push({ x:p.x+(p.face>0?p.w:-10), y:p.y+10, w:12, h:12,
      vx:8*p.face, vy:-2, life:80, kind: p.flame?'fuoco':'ghiaccio' });
  }
  p.bumped = null;
  moveEntity(p, true);
  if(p.onGround) p.jumps = 0;
  if(p.onGround) p.combo = 0;
  if(p.pounding && p.onGround){
    p.pounding=false; shake=14; SFX.stomp();
    puff(p.x+p.w/2,p.y+p.h,'#e8d9c0',18,5);
    const cx=Math.floor((p.x+p.w/2)/TILE), cy=Math.floor((p.y+p.h+2)/TILE);
    for(let dx=-2; dx<=2; dx++){ const tx=cx+dx;
      if(tileAt(world,tx,cy)==='B'){ world.rows[cy][tx]=' '; addScore(50,tx*TILE,cy*TILE); SFX.brick();
        puff(tx*TILE+18,cy*TILE+18,'#b5793d',10,4); } }
    for(const en of world.ents){ if(!en.dead && en.type!=='G' && Math.abs(en.x-p.x)<95 && Math.abs((en.y)-(p.y+p.h))<55){
      en.dead=1; addScore(200,en.x,en.y); SFX.stomp(); puff(en.x+15,en.y+15,'#fff',8); } }
  }
  if(p.bumped) hitBlock(p.bumped.tx, p.bumped.ty, p.bumped.ch);
  // tile speciali
  rectVsTiles(p,(tx,ty,ch)=>{
    if(ch==='c'){ world.rows[ty][tx]=' '; coins++; levelCoinsGot++; addScore(100); SFX.coin();
      puff(tx*TILE+18,ty*TILE+18,'#ffd94a',6);
      if(coins>=50){ coins-=50; lives++; SFX.power(); floatText(p.x,p.y-20,'1UP!','#7dff8a'); } }
    if(ch==='^' ){ hurtPlayer(); if(!p.dead) p.vy=-8; }
    if(ch==='L'){ if(p.star>0){ p.vy=-12; } else killPlayer(); }
  });
  // caduta nel vuoto
  if(p.y > world.h*TILE + 100) killPlayer();
  // traguardo
  if(world.flag){
    const f = { x:world.flag.x*TILE+8, y:0, w:20, h:world.h*TILE };
    if(overlap(p,f) && state==='PLAY'){ levelClear(); }
  }
  if(p.star>0){ p.star--; if(p.star%5===0) puff(p.x+13+((Math.random()-.5)*20), p.y+16, ['#ff4d6d','#ffd60a','#4cc9f0','#57e389'][frame%4],1,1); }
  if(p.inv>0) p.inv--;
  p.animT += Math.abs(p.vx)*0.15;
}
function levelClear(){
  SFX.flag(); state='CLEAR'; clearTimer=0;
  addScore(1000 + Math.floor(timeLeft/60)*10, player.x, player.y-20);
  perfectCoins = world.totalCoins>0 && levelCoinsGot>=world.totalCoins;
  if(perfectCoins){ addScore(1000, player.x, player.y-50); SFX.power(); }
  clearedLevels.add(levelIdx);
}

function updateEnemies(){
  for(const e of world.ents){
    if(e.dead){ e.dead++; e.y += 3; continue; }
    e.t++;
    if(e.frozen>0){
      e.frozen--; e.vy = Math.min(MAXFALL, e.vy+GRAV); e.hitWall=false; moveEntity(e);
      if(!player.dead && player.inv===0 && overlap(player,e)){
        const falling = player.vy > 1 && (player.y+player.h) - e.y < 22;
        if(falling || player.star>0){ e.dead=1; player.vy=-9; SFX.stomp(); addScore(400,e.x,e.y); puff(e.x+15,e.y+15,'#9ae6ff',10); }
      }
      continue;
    }
    if(e.type==='G'){ updateBoss(e); continue; }
    if(e.type==='f'){
      e.x += e.vx; e.y = e.baseY + Math.sin(e.t*0.05)*46;
      const aheadCh = tileAt(world, Math.floor((e.x+(e.vx<0?-2:e.w+2))/TILE), Math.floor((e.y+e.h/2)/TILE));
      if(e.x < 0 || SOLID(aheadCh)) e.vx*=-1;
    } else if(e.type==='j' || e.type==='r'){
      e.vy = Math.min(MAXFALL, e.vy+GRAV);
      if(e.onGround){ e.jumpT--; if(e.jumpT<=0){ e.vy = e.type==='r'?-8:-9.5; e.jumpT=(e.type==='r'?45:70)+Math.random()*(e.type==='r'?30:50);
        const near = Math.abs(player.x-e.x)<380;
        const tgt = near ? player.x : e.homeX;   // insegue solo da vicino, poi torna a casa
        e.vx = (tgt>e.x?1:-1)*(near?1.6:1.2); } else e.vx=0; }
      e.hitWall=false; moveEntity(e); if(e.hitWall) e.vx*=-1;
    } else {
      e.vy = Math.min(MAXFALL, e.vy+GRAV);
      e.hitWall=false; moveEntity(e);
      if(e.hitWall) e.vx*=-1;
      // non cadere dai bordi (gnappo furbo ogni tanto)
      if(e.onGround && e.type==='e'){
        const ahead = tileAt(world, Math.floor((e.x + (e.vx>0?e.w+2:-2))/TILE), Math.floor((e.y+e.h+2)/TILE));
        if(!SOLID(ahead) && ahead!=='=') e.vx*=-1;
      }
    }
    // collisione col giocatore
    if(!player.dead && player.inv===0 && overlap(player,e)){
      const stompable = e.type!=='s';
      const falling = player.vy > 1 && (player.y+player.h) - e.y < 22;
      if(player.star>0){
        e.dead=1; SFX.stomp(); addScore(300,e.x,e.y); puff(e.x+15,e.y+15,'#ffd60a',12);
      } else if(stompable && falling){
        e.dead=1; player.vy=-9; SFX.stomp(); stompScore(e,200); puff(e.x+15,e.y+15,'#fff',8);
      } else hurtPlayer();
    }
  }
  world.ents = world.ents.filter(e=>e.dead<40 && e.y < world.h*TILE+300);
}

function updateBoss(b){
  b.t++; b.pt--; if(b.flash>0) b.flash--;
  const dir = player.x > b.x ? 1 : -1;
  const enraged = b.hp <= Math.ceil(b.maxhp/2);
  if(enraged && !b.enragedAnnounced){ b.enragedAnnounced=true; shake=18; SFX.boss();
    const msg = b.kind==='fulmine' ? 'SI SCATENA LA TEMPESTA!' : (b.kind==='ranocchio' ? 'IL BARONE INFURIA!' : 'RE MELMONE SI INFURIA!');
    floatText(b.x+b.w/2, b.y-10, msg, '#ff4d6d'); }
  const jumpSpeed = -13 - (b.kind==='fulmine' ? 2 : 0);
  if(b.phase==='idle'){
    b.vx *= 0.9;
    if(b.pt<=0){
      const r = Math.random();
      if(b.kind==='fulmine'){
        if(enraged && r<0.45) b.phase='bolt2';
        else if(r<0.75) b.phase='bolt';
        else b.phase='jump';
      } else if(b.kind==='ranocchio'){
        if(r < (enraged?0.55:0.4)) b.phase='spit';
        else b.phase='jump';
      } else {
        if(enraged && r<0.35) b.phase='spit';
        else if(b.hp<=3 && r<0.7) b.phase='spawn';
        else b.phase='jump';
      }
      b.pt=1;
    }
  } else if(b.phase==='jump'){
    if(b.onGround){ b.vy = jumpSpeed; b.vx = dir*(2.2+(b.maxhp-b.hp)*0.35); SFX.boss(); b.phase='air'; }
  } else if(b.phase==='air'){
    if(b.onGround && b.vy>=0){ shake=enraged?16:12; SFX.boss();
      puff(b.x+b.w/2,b.y+b.h,(BOSS_PAL[b.kind]||BOSS_PAL.melmone).body,16,5);
      b.phase='idle'; b.pt=(enraged?36:58)+Math.random()*40; b.vx=0; }
  } else if(b.phase==='spawn'){
    world.ents.push(makeEnemy(b.kind==='ranocchio'?'r':'e', Math.floor((b.x+b.w/2)/TILE), Math.floor(b.y/TILE)));
    SFX.boss(); b.phase='idle'; b.pt=90;
  } else if(b.phase==='spit'){
    const kindProj = b.kind==='ranocchio' ? 'veleno' : 'fuoco';
    world.fireballs.push({ x:b.x+b.w/2, y:b.y+30, w:14, h:14, vx:6*dir, vy:-4, life:75, kind:kindProj, hostile:true });
    SFX.fire(); b.phase='idle'; b.pt=55;
  } else if(b.phase==='bolt' || b.phase==='bolt2'){
    const n = b.phase==='bolt2' ? 2 : 1;
    for(let i=0;i<n;i++){
      const tx = i===0 ? player.x : player.x + (Math.random()-.5)*220;
      world.warnings.push({ x: tx, t: 34 });
    }
    SFX.hurt(); b.phase='idle'; b.pt=90;
  }
  b.vy = Math.min(MAXFALL, b.vy+GRAV);
  moveEntity(b);
  if(!player.dead && player.inv===0 && overlap(player,b)){
    const falling = player.vy>1 && (player.y+player.h)-b.y < 30;
    if(falling || player.star>0){ damageBoss(b); player.vy=-11; }
    else hurtPlayer();
  }
}
function damageBoss(b){
  if(b.flash>0) return;
  b.hp--; b.flash=40; SFX.stomp(); shake=10; addScore(500,b.x+b.w/2,b.y);
  puff(b.x+b.w/2,b.y+20,'#ff4d6d',16,5);
  if(b.hp<=0){ b.dead=1; addScore(5000,b.x,b.y); SFX.flag(); bossDeadT=54; }
}

function updateStuff(){
  // fireballs
  const projCol = k => k==='ghiaccio'?'#9ae6ff': k==='veleno'?'#9b5de5': k==='fulmine'?'#ffe066' : '#ff9f1c';
  for(const f of world.fireballs){
    f.life--; f.vy = Math.min(9, f.vy+0.35);
    f.x += f.vx; f.y += f.vy;
    const tch = tileAt(world, Math.floor((f.x+6)/TILE), Math.floor((f.y+12)/TILE));
    if(SOLID(tch)){ if(f.noBounce){ f.life=0; puff(f.x,f.y,projCol(f.kind),8); } else f.vy = -6; }
    const sideCh = tileAt(world, Math.floor((f.x+(f.vx>0?12:0))/TILE), Math.floor((f.y+6)/TILE));
    if(SOLID(sideCh)){ f.life=0; puff(f.x,f.y,projCol(f.kind),6); }
    if(f.hostile){
      if(!player.dead && player.inv===0 && overlap(f,player)){
        f.life=0; puff(f.x,f.y,projCol(f.kind),8); hurtPlayer();
      }
    } else {
      for(const e of world.ents){
        if(!e.dead && overlap(f,e)){
          f.life=0; puff(f.x,f.y,projCol(f.kind),8);
          if(e.type==='G'){ if(f.kind!=='ghiaccio') damageBoss(e); else { e.flash=15; SFX.hurt(); } }
          else if(f.kind==='ghiaccio'){ if(e.frozen>0){ e.dead=1; SFX.stomp(); addScore(300,e.x,e.y); }
            else { e.frozen=170; e.vx=0; SFX.shield(); } }
          else { e.dead=1; SFX.stomp(); addScore(200,e.x,e.y); }
        }
      }
    }
    if(f.life<=0 || f.y>world.h*TILE) f.gone=true;
  }
  world.fireballs = world.fireballs.filter(f=>!f.gone);
  // avvisi fulmine (telegrafo prima dello strike)
  for(const w of world.warnings){
    w.t--;
    if(w.t===10) SFX.fire();
    if(w.t<=0){
      world.fireballs.push({ x:w.x, y:0, w:14, h:26, vx:0, vy:6, life:120, kind:'fulmine', hostile:true, noBounce:true });
      w.gone=true;
    }
  }
  world.warnings = world.warnings.filter(w=>!w.gone);
  // items
  for(const it of world.items){
    it.vy = Math.min(8, it.vy+0.3);
    it.hitWall=false; moveEntity(it);
    if(it.hitWall) it.vx*=-1;
    if(it.kind==='stella' && it.onGround) it.vy=-7;
    if(overlap(player,it) && !player.dead){ it.gone=true; applyItem(it.kind); }
    if(it.y>world.h*TILE+80) it.gone=true;
  }
  world.items = world.items.filter(i=>!i.gone);
  // particelle
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; }
  particles = particles.filter(p=>p.life>0);
  for(const f of floats){ f.y-=0.8; f.life--; }
  floats = floats.filter(f=>f.life>0);
}

function updateCam(){
  const tx = player.x - W/2 + 40*player.face;
  cam.x += (tx - cam.x)*0.1;
  cam.x = Math.max(0, Math.min(world.w*TILE - W, cam.x));
  const ty = player.y - H/2;
  cam.y += (ty - cam.y)*0.08;
  cam.y = Math.max(-40, Math.min(world.h*TILE - H + 40, cam.y));
  if(world.h*TILE < H) cam.y = world.h*TILE - H;
}

/* ============================= RENDER ============================= */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); }
function hexA(hex,a){
  const n = parseInt(hex.slice(1),16);
  return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';
}
function drawSky(cfg){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,cfg.sky[0]); g.addColorStop(1,cfg.sky[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const w = cfg.world||1;

  if(w===3){
    // MONDO 3: lampi in lontananza + sagome di torri
    if(Math.random()<0.01){ ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(0,0,W,H); }
    ctx.fillStyle = cfg.hills;
    for(let i=0;i<6;i++){
      const hx = ((i*300 - cam.x*0.25)%(W+300))-150;
      rr(hx-20, H-160, 40, 160, 4); rr(hx-30, H-120, 60, 120, 4);
    }
  } else if(w===2){
    // MONDO 2: canne di palude + nebbia
    ctx.fillStyle = cfg.hills;
    for(let i=0;i<10;i++){
      const hx = ((i*180 - cam.x*0.3)%(W+200))-100;
      const hh = 60+((i*53)%50);
      rr(hx-3, H-hh, 6, hh, 2); rr(hx-14, H-hh+14, 28, 10, 5);
    }
  } else {
    // MONDO 1: colline morbide
    ctx.fillStyle = cfg.hills;
    for(let i=0;i<8;i++){
      const hx = ((i*340 - cam.x*0.3)%(W+400))-200;
      ctx.beginPath(); ctx.arc(hx, H-40, 150+((i*77)%90), Math.PI, 0); ctx.fill();
    }
  }
  // nuvole / stelle / nebbia a seconda del mondo
  for(let i=0;i<7;i++){
    const nx = ((i*290 - cam.x*0.15 + 9999)%(W+300))-150;
    const ny = 40 + (i*53)%140;
    if(levelIdx===1){ ctx.fillStyle='rgba(255,255,255,.75)'; ctx.fillRect(nx,ny,3,3); }
    else if(w===2){ ctx.fillStyle='rgba(220,255,210,.25)'; rr(nx,ny+60,140,30,15); }
    else if(w===3){ ctx.fillStyle='rgba(255,255,255,.55)'; rr(nx,ny,70,16,8); rr(nx+16,ny-10,36,16,8); }
    else { ctx.fillStyle='rgba(255,255,255,.75)'; rr(nx,ny,90,24,12); rr(nx+20,ny-14,50,22,11); }
  }
}
function drawTiles(){
  const x0 = Math.floor(cam.x/TILE), x1 = Math.ceil((cam.x+W)/TILE);
  const y0 = Math.max(0,Math.floor(cam.y/TILE)), y1 = Math.min(world.h-1, Math.ceil((cam.y+H)/TILE));
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++){
    const ch = tileAt(world,tx,ty);
    if(ch===' ') continue;
    const x = tx*TILE - cam.x, y = ty*TILE - cam.y;
    if(ch==='#'){ ctx.fillStyle='#7a4a21'; ctx.fillRect(x,y,TILE,TILE);
      if(!SOLID(tileAt(world,tx,ty-1))){ ctx.fillStyle='#4caf50'; ctx.fillRect(x,y,TILE,9); }
      ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(x+4,y+16,10,8); ctx.fillRect(x+20,y+24,9,7); }
    else if(ch==='X'){ ctx.fillStyle='#6b7280'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle='#9aa3af'; ctx.fillRect(x+2,y+2,TILE-4,4);
      ctx.fillStyle='rgba(0,0,0,.2)'; ctx.fillRect(x+3,y+20,12,9); }
    else if(ch==='B'){ ctx.fillStyle='#b5793d'; rr(x+1,y+1,TILE-2,TILE-2,4);
      ctx.strokeStyle='#7a4a21'; ctx.lineWidth=3;
      ctx.strokeRect(x+5,y+5,TILE-10,TILE-10);
      ctx.beginPath(); ctx.moveTo(x+5,y+5); ctx.lineTo(x+TILE-5,y+TILE-5);
      ctx.moveTo(x+TILE-5,y+5); ctx.lineTo(x+5,y+TILE-5); ctx.stroke(); }
    else if(ch==='?'||ch==='M'){
      const bounce = Math.sin(frame*0.12 + tx)*2;
      ctx.fillStyle = ch==='?' ? '#f2b705' : '#e055c3';
      rr(x+2,y+2+bounce,TILE-4,TILE-4,6);
      ctx.fillStyle='#fff'; ctx.font='bold 20px Courier New'; ctx.textAlign='center';
      ctx.fillText(ch==='?'?'★':'♦', x+TILE/2, y+26+bounce); }
    else if(ch==='='){ ctx.fillStyle='#c98f4e'; rr(x,y+2,TILE,12,4);
      ctx.fillStyle='#8a5a2a'; ctx.fillRect(x+4,y+10,4,4); ctx.fillRect(x+26,y+10,4,4); }
    else if(ch==='c'){
      const b = Math.sin(frame*0.1+tx*2)*3;
      ctx.fillStyle='#ffd94a'; ctx.beginPath();
      ctx.ellipse(x+TILE/2, y+TILE/2+b, 9, 12, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#c79a00'; ctx.fillRect(x+TILE/2-2, y+TILE/2-7+b, 4, 14); }
    else if(ch==='^'){ ctx.fillStyle='#cbd5e1';
      for(let i=0;i<3;i++){ ctx.beginPath();
        ctx.moveTo(x+i*12, y+TILE); ctx.lineTo(x+i*12+6, y+8); ctx.lineTo(x+i*12+12, y+TILE);
        ctx.fill(); } }
    else if(ch==='L'){
      const hz = world.cfg.hazard || ['#ff4400','#ffaa00'];
      ctx.fillStyle=hz[0]; ctx.fillRect(x,y+6,TILE,TILE-6);
      ctx.fillStyle=hz[1];
      ctx.fillRect(x, y+4+Math.sin(frame*0.15+tx)*3, TILE, 6);
      if(Math.random()<0.02) puff(x+Math.random()*TILE, y+4, hz[1],1,1.5); }
  }
  // bandiera traguardo
  if(world.flag){
    const fx = world.flag.x*TILE - cam.x + 14;
    ctx.fillStyle='#e5e7eb'; ctx.fillRect(fx, 0-cam.y, 6, world.h*TILE);
    const fy = (world.flag.y)*TILE - cam.y + Math.sin(frame*0.08)*4;
    ctx.fillStyle='#ff4d6d'; ctx.beginPath();
    ctx.moveTo(fx+6,fy); ctx.lineTo(fx+52,fy+14); ctx.lineTo(fx+6,fy+28); ctx.fill();
  }
}
function drawPlayer(){
  const p = player;
  if(p.inv>0 && frame%6<3 && !p.dead) return;
  const x = p.x - cam.x, y = p.y - cam.y;
  let col = p.c.color, col2 = p.c.color2;
  if(p.star>0){ col = ['#ff4d6d','#ffd60a','#4cc9f0','#57e389'][Math.floor(frame/4)%4]; }
  else if(p.flame){ col2 = '#ffdd99'; }
  ctx.save();
  if(p.dead){ ctx.translate(x+p.w/2, y+p.h/2); ctx.rotate(p.deadT*0.15); ctx.translate(-(x+p.w/2),-(y+p.h/2)); }
  // scudo
  if(p.shield){ ctx.strokeStyle='rgba(87,227,137,.8)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(x+p.w/2, y+p.h/2, p.h/2+8+Math.sin(frame*0.2)*2, 0, Math.PI*2); ctx.stroke(); }
  // corpo
  ctx.fillStyle = col; rr(x, y+4, p.w, p.h-4, 8);
  // pancia
  ctx.fillStyle = col2; rr(x+5, y+p.h*0.45, p.w-10, p.h*0.45, 6);
  // orecchie
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.moveTo(x+3,y+8); ctx.lineTo(x+8,y-6); ctx.lineTo(x+13,y+6); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+p.w-13,y+6); ctx.lineTo(x+p.w-8,y-6); ctx.lineTo(x+p.w-3,y+8); ctx.fill();
  // occhi
  const ex = p.face>0 ? 4 : -4;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(x+9+ex, y+14, 5, 0, Math.PI*2); ctx.arc(x+p.w-9+ex, y+14, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(x+9+ex+p.face*2, y+14, 2.4, 0, Math.PI*2); ctx.arc(x+p.w-9+ex+p.face*2, y+14, 2.4, 0, Math.PI*2); ctx.fill();
  // gambette
  if(!p.dead && p.onGround && Math.abs(p.vx)>0.5){
    const s = Math.sin(p.animT*2)*4;
    ctx.fillStyle=col;
    ctx.fillRect(x+4, y+p.h-3+s*0.5, 7, 5); ctx.fillRect(x+p.w-11, y+p.h-3-s*0.5, 7, 5);
  }
  // fiamma / ghiaccio in mano
  if(p.flame && !p.dead){ ctx.fillStyle='#ff9f1c';
    ctx.beginPath(); ctx.arc(x+(p.face>0?p.w+3:-3), y+p.h*0.6, 4+Math.sin(frame*0.3)*1.5, 0, Math.PI*2); ctx.fill(); }
  if(p.ice && !p.dead){ ctx.fillStyle='#9ae6ff';
    ctx.beginPath(); ctx.arc(x+(p.face>0?p.w+3:-3), y+p.h*0.6, 4+Math.sin(frame*0.3)*1.5, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();
}
function drawEnemies(){
  for(const e of world.ents){
    const x = e.x-cam.x, y = e.y-cam.y;
    if(x<-160||x>W+160) continue;
    ctx.save();
    if(e.dead){ ctx.globalAlpha = Math.max(0,1-e.dead/40); ctx.translate(x+e.w/2,y+e.h/2); ctx.scale(1,-1); ctx.translate(-(x+e.w/2),-(y+e.h/2)); }
    if(e.type==='G'){
      const pal = BOSS_PAL[e.kind]||BOSS_PAL.melmone;
      if(e.flash>0 && frame%4<2) ctx.globalAlpha=0.4;
      const squish = e.onGround ? Math.sin(e.t*0.1)*4 : -8;
      const dx = player.x>e.x?3:-3;

      if(e.kind==='ranocchio'){
        // BARONE RANOCCHIO: corpo tozzo e rotondo, occhioni in cima, zampe palmate
        ctx.fillStyle=pal.body; rr(x, y+18+squish, e.w, e.h-18-squish, 34);
        ctx.fillStyle=pal.body2; rr(x+10, y+40+squish*0.5, e.w-20, e.h-52, 22);
        // zampe palmate
        ctx.fillStyle=pal.body;
        for(const lx of [x+10,x+e.w-34]){ rr(lx, y+e.h-14, 24, 16, 8);
          for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(lx+6+i*7, y+e.h, 5,0,Math.PI*2); ctx.fill(); } }
        // occhioni sporgenti in cima
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(x+30,y+10+squish,17,0,Math.PI*2); ctx.arc(x+e.w-30,y+10+squish,17,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#183a0a';
        ctx.beginPath(); ctx.arc(x+30+dx,y+11+squish,8,0,Math.PI*2); ctx.arc(x+e.w-30+dx,y+11+squish,8,0,Math.PI*2); ctx.fill();
        // cilindro da barone
        ctx.fillStyle='#1a2a12'; rr(x+e.w/2-16,y-24+squish,32,18,3);
        ctx.fillStyle=pal.crown; rr(x+e.w/2-20,y-8+squish,40,6,2);
        // bocca larga
        ctx.strokeStyle='#183a0a'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(x+e.w/2,y+52+squish,22,0.15,Math.PI-0.15); ctx.stroke();
      } else if(e.kind==='fulmine'){
        // IMPERATORE FULMINE: alto, mantello, corona a saetta, occhi che brillano
        ctx.fillStyle=pal.body2; // mantello dietro
        ctx.beginPath(); ctx.moveTo(x+6,y-4+squish); ctx.lineTo(x-8,y+e.h+squish);
        ctx.lineTo(x+e.w+8,y+e.h+squish); ctx.lineTo(x+e.w-6,y-4+squish); ctx.closePath(); ctx.fill();
        ctx.fillStyle=pal.body; rr(x+16, y+8+squish, e.w-32, e.h-16-squish, 22);
        ctx.fillStyle=pal.crown;
        ctx.beginPath(); // corona a fulmine
        ctx.moveTo(x+e.w/2-6,y-38+squish); ctx.lineTo(x+e.w/2+14,y-38+squish);
        ctx.lineTo(x+e.w/2-2,y-14+squish); ctx.lineTo(x+e.w/2+10,y-14+squish);
        ctx.lineTo(x+e.w/2-14,y+14+squish); ctx.lineTo(x+e.w/2-4,y-8+squish);
        ctx.lineTo(x+e.w/2-16,y-8+squish); ctx.closePath(); ctx.fill();
        // occhi luminosi
        ctx.fillStyle='#fff9d6';
        ctx.beginPath(); ctx.arc(x+e.w/2-16,y+40+squish,7,0,Math.PI*2); ctx.arc(x+e.w/2+16,y+40+squish,7,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ffe066';
        ctx.beginPath(); ctx.arc(x+e.w/2-16+dx,y+40+squish,3.5,0,Math.PI*2); ctx.arc(x+e.w/2+16+dx,y+40+squish,3.5,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#1a1030'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(x+e.w/2,y+64+squish,14,0.2,Math.PI-0.2); ctx.stroke();
      } else {
        // RE MELMONE: gelatina tonda con corona classica
        ctx.fillStyle=pal.body; rr(x, y+squish, e.w, e.h-squish, 28);
        ctx.fillStyle=pal.body2; rr(x+12, y+24+squish*0.5, e.w-24, e.h-40, 20);
        ctx.fillStyle=pal.crown;
        ctx.beginPath();
        ctx.moveTo(x+28,y+squish); ctx.lineTo(x+34,y-18+squish); ctx.lineTo(x+44,y-4+squish);
        ctx.lineTo(x+55,y-20+squish); ctx.lineTo(x+66,y-4+squish); ctx.lineTo(x+76,y-18+squish);
        ctx.lineTo(x+82,y+squish); ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(x+36,y+34+squish,9,0,Math.PI*2); ctx.arc(x+74,y+34+squish,9,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#111';
        ctx.beginPath(); ctx.arc(x+36+dx,y+35+squish,4,0,Math.PI*2); ctx.arc(x+74+dx,y+35+squish,4,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#111'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(x+26,y+22+squish); ctx.lineTo(x+44,y+28+squish);
        ctx.moveTo(x+84,y+22+squish); ctx.lineTo(x+66,y+28+squish); ctx.stroke();
        ctx.beginPath(); ctx.arc(x+55,y+60+squish,12,0.2,Math.PI-0.2); ctx.stroke();
      }
    } else if(e.type==='e'){
      ctx.fillStyle='#8d6a3f'; rr(x,y+6,e.w,e.h-6,10);
      ctx.fillStyle='#5c4327'; rr(x+3,y+e.h-8,8,8,3); rr(x+e.w-11,y+e.h-8,8,8,3);
      ctx.fillStyle='#fff'; ctx.beginPath();
      ctx.arc(x+9,y+14,4,0,Math.PI*2); ctx.arc(x+e.w-9,y+14,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.beginPath();
      ctx.arc(x+9+(e.vx<0?-1.5:1.5),y+14,2,0,Math.PI*2); ctx.arc(x+e.w-9+(e.vx<0?-1.5:1.5),y+14,2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#111'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x+e.w/2,y+22,5,0.3,Math.PI-0.3); ctx.stroke();
    } else if(e.type==='s'){
      ctx.fillStyle='#3d6b8c'; rr(x,y+8,e.w,e.h-8,8);
      ctx.fillStyle='#dbe7f0';
      for(let i=0;i<4;i++){ ctx.beginPath();
        ctx.moveTo(x+2+i*8,y+10); ctx.lineTo(x+6+i*8,y-4); ctx.lineTo(x+10+i*8,y+10); ctx.fill(); }
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+10,y+17,3.5,0,Math.PI*2); ctx.arc(x+e.w-10,y+17,3.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.fillRect(x+9,y+16,3,3); ctx.fillRect(x+e.w-12,y+16,3,3);
    } else if(e.type==='f'){
      ctx.fillStyle='#c0569c'; rr(x,y+4,e.w,e.h-8,12);
      const wing = Math.sin(e.t*0.4)*10;
      ctx.fillStyle='#e9a8d4';
      ctx.beginPath(); ctx.ellipse(x+4,y+8+wing*0.3,10,5,-0.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+e.w-4,y+8-wing*0.3,10,5,0.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+10,y+14,4,0,Math.PI*2); ctx.arc(x+e.w-10,y+14,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.fillRect(x+9,y+13,3,3); ctx.fillRect(x+e.w-12,y+13,3,3);
    } else if(e.type==='j'){
      const sq = e.onGround ? 4 : -4;
      ctx.fillStyle='#5eb04a'; rr(x,y+sq,e.w,e.h-sq,12);
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+10,y+12+sq,5,0,Math.PI*2); ctx.arc(x+e.w-10,y+12+sq,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(x+10,y+13+sq,2.5,0,Math.PI*2); ctx.arc(x+e.w-10,y+13+sq,2.5,0,Math.PI*2); ctx.fill();
    } else if(e.type==='r'){
      const sq = e.onGround ? 5 : -5;
      ctx.fillStyle='#7fd94a'; rr(x,y+4+sq,e.w,e.h-4-sq,10);
      ctx.fillStyle='#5aa832'; rr(x+2,y+e.h-6,e.w-4,6,3);
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+7,y+2+sq,5,0,Math.PI*2); ctx.arc(x+e.w-7,y+2+sq,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#2a6b1a'; ctx.beginPath(); ctx.arc(x+7,y+2+sq,2.3,0,Math.PI*2); ctx.arc(x+e.w-7,y+2+sq,2.3,0,Math.PI*2); ctx.fill();
    }
    if(e.frozen>0 && e.type!=='G'){
      ctx.fillStyle='rgba(154,230,255,.55)'; rr(x-2,y-2,e.w+4,e.h+4,8);
      ctx.strokeStyle='#e8fbff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+e.w/2,y-2); ctx.lineTo(x+e.w/2,y+e.h+2);
      ctx.moveTo(x-2,y+e.h/2); ctx.lineTo(x+e.w+2,y+e.h/2); ctx.stroke();
    }
    ctx.restore();
  }
}
function drawStuff(){
  for(const w of world.warnings){
    const wx = w.x - cam.x + 6;
    const pulse = w.t%10<5;
    ctx.globalAlpha = pulse ? 0.75 : 0.35;
    ctx.fillStyle = '#ffe066';
    ctx.fillRect(wx-9, 0, 18, H);
    ctx.globalAlpha = 1;
    ctx.fillStyle='#fff9d6'; ctx.textAlign='center'; ctx.font='bold 20px Courier New';
    ctx.fillText('!', wx, 40);
  }
  for(const it of world.items){
    const x = it.x-cam.x, y = it.y-cam.y;
    const info = ITEM_INFO[it.kind];
    ctx.fillStyle = info.col;
    if(it.kind==='stella'){
      ctx.save(); ctx.translate(x+14,y+14); ctx.rotate(frame*0.05);
      ctx.beginPath();
      for(let i=0;i<10;i++){ const r=i%2?7:15, a=i*Math.PI/5-Math.PI/2;
        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); }
      ctx.fill(); ctx.restore();
    } else if(it.kind==='piuma'){
      ctx.beginPath(); ctx.ellipse(x+14,y+14,7,15,0.6+Math.sin(frame*0.1)*0.15,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+8,y+24); ctx.lineTo(x+20,y+4); ctx.stroke();
    } else if(it.kind==='scudo'){
      ctx.beginPath(); ctx.arc(x+14,y+14,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#2a8a4a'; ctx.beginPath(); ctx.arc(x+14,y+14,7,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(x+14,y+16,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#3f7a2a'; rr(x+11,y+1,6,8,2);
      ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(x+9,y+11,3.5,0,Math.PI*2); ctx.fill();
    }
  }
  const PROJ_COL = { ghiaccio:['#9ae6ff','#eafcff'], veleno:['#9b5de5','#e0c8ff'], fulmine:['#ffe066','#fff9d6'], fuoco:['#ff9f1c','#fff3b0'] };
  for(const f of world.fireballs){
    const [c1,c2] = PROJ_COL[f.kind]||PROJ_COL.fuoco;
    if(f.kind==='fulmine'){
      ctx.strokeStyle=c1; ctx.lineWidth=4; ctx.beginPath();
      const fx=f.x-cam.x+6, fy=f.y-cam.y;
      ctx.moveTo(fx-4,fy); ctx.lineTo(fx+4,fy+10); ctx.lineTo(fx-2,fy+10); ctx.lineTo(fx+6,fy+24); ctx.stroke();
    } else {
      ctx.fillStyle = c1; ctx.beginPath();
      ctx.arc(f.x-cam.x+6, f.y-cam.y+6, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = c2; ctx.beginPath();
      ctx.arc(f.x-cam.x+6, f.y-cam.y+6, 3.5, 0, Math.PI*2); ctx.fill();
    }
  }
  for(const p of particles){
    ctx.globalAlpha = Math.min(1, p.life/20);
    ctx.fillStyle = p.col; ctx.fillRect(p.x-cam.x, p.y-cam.y, p.r, p.r);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign='center'; ctx.font='bold 16px Courier New';
  for(const f of floats){
    ctx.globalAlpha = Math.min(1, f.life/25);
    ctx.fillStyle = f.col; ctx.fillText(f.txt, f.x-cam.x, f.y-cam.y);
  }
  ctx.globalAlpha = 1;
}
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,.4)'; rr(0,0,W,44,0);
  ctx.font='bold 18px Courier New'; ctx.textAlign='left'; ctx.fillStyle='#fff';
  ctx.fillText('♥×'+Math.max(0,lives) + (player.extraHits>0?' (+'+player.extraHits+')':''), 16, 29);
  ctx.fillStyle='#ffd94a'; ctx.fillText('◉ '+coins, 150, 29);
  ctx.fillStyle='#fff'; ctx.fillText('PUNTI '+score, 250, 29);
  ctx.textAlign='right';
  ctx.fillText('⏱ '+Math.ceil(timeLeft/60), W-16, 29);
  ctx.textAlign='center'; ctx.fillStyle='#9ae6ff';
  ctx.fillText(LEVELS[levelIdx].name, W/2+80, 29);
  // power-up attivi
  let px = 460; ctx.textAlign='left'; ctx.font='bold 14px Courier New';
  const tags = [];
  if(player.big) tags.push(['GIGANTE','#ff4d6d']);
  if(player.flame) tags.push(['FIAMMA','#ff9f1c']);
  if(player.ice) tags.push(['GHIACCIO','#9ae6ff']);
  if(player.feather) tags.push(['PIUMA','#4cc9f0']);
  if(player.shield) tags.push(['SCUDO','#57e389']);
  if(player.star>0) tags.push(['STELLA '+Math.ceil(player.star/60),'#ffd60a']);
  // barra vita boss
  const b = world.boss;
  if(b && !b.dead && world.cfg.boss){
    const pal = BOSS_PAL[b.kind]||BOSS_PAL.melmone;
    ctx.fillStyle='rgba(0,0,0,.5)'; rr(W/2-160, 54, 320, 26, 8);
    ctx.fillStyle=pal.body2; rr(W/2-155, 58, 310*(b.hp/b.maxhp), 18, 6);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold 14px Courier New';
    ctx.fillText(BOSS_NAMES[b.kind]||'RE MELMONE', W/2, 72);
  }
  // riga power-up sotto HUD
  ctx.font='bold 14px Courier New'; ctx.textAlign='left';
  let sx = 16;
  for(const [t,c] of tags){
    ctx.fillStyle='rgba(0,0,0,.35)';
    const wTag = ctx.measureText(t).width+16;

function drawNodeIcon(kind, x, y, s, col){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=col; ctx.strokeStyle=col; ctx.lineWidth=Math.max(2,s*0.14);
  if(kind==='flower'){
    for(let i=0;i<5;i++){ const a=i*Math.PI*2/5;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*0.4, Math.sin(a)*s*0.4, s*0.32, 0, Math.PI*2); ctx.fill(); }
    ctx.fillStyle='#fff3b0'; ctx.beginPath(); ctx.arc(0,0,s*0.28,0,Math.PI*2); ctx.fill();
  } else if(kind==='flame'){
    ctx.beginPath();
    ctx.moveTo(0,-s*0.9); ctx.quadraticCurveTo(s*0.7,-s*0.1, s*0.25,s*0.5);
    ctx.quadraticCurveTo(s*0.35,s*0.1, 0,s*0.9);
    ctx.quadraticCurveTo(-s*0.35,s*0.1, -s*0.25,s*0.5);
    ctx.quadraticCurveTo(-s*0.7,-s*0.1, 0,-s*0.9); ctx.fill();
  } else if(kind==='crown'){
    ctx.beginPath();
    ctx.moveTo(-s*0.8,s*0.4); ctx.lineTo(-s*0.8,-s*0.1); ctx.lineTo(-s*0.4,s*0.15);
    ctx.lineTo(0,-s*0.55); ctx.lineTo(s*0.4,s*0.15); ctx.lineTo(s*0.8,-s*0.1);
    ctx.lineTo(s*0.8,s*0.4); ctx.closePath(); ctx.fill();
  } else if(kind==='frog' || kind==='frogcrown'){
    ctx.beginPath(); ctx.ellipse(0,s*0.15,s*0.65,s*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-s*0.4,-s*0.35,s*0.28,0,Math.PI*2); ctx.arc(s*0.4,-s*0.35,s*0.28,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0d1420';
    ctx.beginPath(); ctx.arc(-s*0.4,-s*0.35,s*0.12,0,Math.PI*2); ctx.arc(s*0.4,-s*0.35,s*0.12,0,Math.PI*2); ctx.fill();
    if(kind==='frogcrown'){ ctx.fillStyle=col;
      ctx.beginPath(); ctx.moveTo(-s*0.3,-s*0.65); ctx.lineTo(-s*0.15,-s*0.95); ctx.lineTo(0,-s*0.65);
      ctx.lineTo(s*0.15,-s*0.95); ctx.lineTo(s*0.3,-s*0.65); ctx.closePath(); ctx.fill(); }
  } else if(kind==='pillar'){
    ctx.fillRect(-s*0.55,-s*0.7,s*1.1,s*0.22);
    ctx.fillRect(-s*0.32,-s*0.4,s*0.64,s*1.0);
    ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillRect(-s*0.32,s*0.1,s*0.64,s*0.16);
  } else if(kind==='cloud'){
    ctx.beginPath();
    ctx.arc(-s*0.35,s*0.1,s*0.4,0,Math.PI*2); ctx.arc(s*0.15,-s*0.1,s*0.5,0,Math.PI*2);
    ctx.arc(s*0.55,s*0.15,s*0.35,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-s*0.5,s*0.05,s*1.1,s*0.35);
  } else if(kind==='tower'){
    ctx.fillRect(-s*0.3,-s*0.3,s*0.6,s*1.0);
    ctx.beginPath(); ctx.moveTo(-s*0.42,-s*0.3); ctx.lineTo(0,-s*0.9); ctx.lineTo(s*0.42,-s*0.3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffe066'; ctx.fillRect(-s*0.1,s*0.15,s*0.2,s*0.3);
  } else if(kind==='bolt'){
    ctx.beginPath();
    ctx.moveTo(s*0.15,-s*0.9); ctx.lineTo(-s*0.35,s*0.05); ctx.lineTo(-s*0.02,s*0.05);
    ctx.lineTo(-s*0.2,s*0.9); ctx.lineTo(s*0.4,-s*0.15); ctx.lineTo(s*0.05,-s*0.15);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

/* ============================= UI HANDLERS ============================= */
function handleUIKey(k){
  if(state==='INTRO'){ if(k===' ') state='TITLE'; return; }
  if(state==='TITLE'){
    if(showQuitMsg){ if(k===' ') showQuitMsg=false; return; }
    if(k==='ArrowUp'){ titleSel=(titleSel+2)%3; SFX.coin(); }
    if(k==='ArrowDown'){ titleSel=(titleSel+1)%3; SFX.coin(); }
    if(k===' '){
      if(titleSel===0){ state='MENU'; SFX.power(); }
      else if(titleSel===1){ state='SETTINGS'; SFX.coin(); }
      else { try{ window.close(); }catch(e){} showQuitMsg=true; }
    }
    return;
  }
  if(state==='SETTINGS'){
    if(k==='1'){ musicOn=!musicOn; SFX.coin(); }
    if(k==='2'){ sfxOn=!sfxOn; SFX.coin(); }
    if(k===' '||k==='Escape'){ state='TITLE'; }
    return;
  }
  if(state==='CREDITS'){ if(k===' ') state='TITLE'; return; }
  if(state==='MENU'){
    if(k==='ArrowLeft') { charIdx=(charIdx+2)%3; SFX.coin(); }
    if(k==='ArrowRight'){ charIdx=(charIdx+1)%3; SFX.coin(); }
    if(k==='Escape'){ state='TITLE'; }
    if(k===' '){ mapSel = Math.min(mapSel, LEVELS.length-1); state='WORLDMAP'; SFX.power();
      const p = MAP_NODES[mapSel]; mapAvatarX=p.x; mapAvatarY=p.y-46; }
  } else if(state==='WORLDMAP'){
    if(k==='ArrowLeft' || k==='ArrowUp'){ mapSel=Math.max(0,mapSel-1); SFX.coin(); }
    if(k==='ArrowRight'|| k==='ArrowDown'){ mapSel=Math.min(LEVELS.length-1,mapSel+1); SFX.coin(); }
    if(k==='Escape'){ state='MENU'; }
    if(k===' '){ score=0; coins=0; lives=3; player=null; scoreSaved=false; startLevel(mapSel); }
  } else if(state==='WORLDCARD' && k===' '){ state='PLAY';
  } else if(state==='BOSSCARD' && k===' '){ state='PLAY';
  } else if(state==='WORLDEND' && k===' ' && worldEndT<190){ startLevel(levelIdx+1);
  } else if(state==='CLEAR' && k===' ' && clearTimer>40){
    if(!LEVELS[levelIdx].finalBoss && levelIdx+1<LEVELS.length) startLevel(levelIdx+1);
    else { state='CREDITS'; saveScoreIfHigh(score); frame=0; }
  } else if(state==='GAMEOVER' && k===' '){ state='TITLE'; }
}
function handleClick(mx,my){
  if(state==='TITLE'){
    if(showQuitMsg){ handleUIKey(' '); return; }
    const opts=['GIOCA','IMPOSTAZIONI','ESCI'];
    for(let i=0;i<3;i++){ const y=300+i*70;
      if(mx>W/2-140&&mx<W/2+140&&my>y-28&&my<y+28){ titleSel=i; handleUIKey(' '); return; } }
    return;
  }
  if(state==='SETTINGS'){
    if(mx>W/2-220&&mx<W/2+220&&my>190&&my<250){ handleUIKey('1'); return; }
    if(mx>W/2-220&&mx<W/2+220&&my>270&&my<330){ handleUIKey('2'); return; }
    handleUIKey(' '); return;
  }
  if(state==='WORLDMAP'){
    for(let i=0;i<MAP_NODES.length;i++){
      const p = MAP_NODES[i];
      if(Math.hypot(mx-p.x,my-p.y)<32){
        if(mapSel===i) handleUIKey(' '); else { mapSel=i; SFX.coin(); }
        return;
      }
    }
    return;
  }
  if(state==='MENU'){
    for(let i=0;i<3;i++){
      const cx = W/2+(i-1)*250;
      if(mx>cx-105&&mx<cx+105&&my>215&&my<415){
        if(charIdx===i){ handleUIKey(' '); }
        else { charIdx=i; SFX.coin(); }
        return;
      }
    }
    if(my>440) handleUIKey(' ');
  } else handleUIKey(' ');
}

/* ============================= LOOP ============================= */
function tick(){
  frame++;
  if(state==='PLAY'){
    timeLeft--;
    if(timeLeft<=0) killPlayer();
    updatePlayer(); updateEnemies(); updateStuff(); updateCam();
    if(world.boss && world.boss.dead && bossDeadT>0){
      bossDeadT--;
      if(bossDeadT<=0){
        clearedLevels.add(levelIdx);
        if(LEVELS[levelIdx].finalBoss){ state='CREDITS'; saveScoreIfHigh(score); frame=0; }
        else if(LEVELS[levelIdx+1].world !== LEVELS[levelIdx].world){ state='WORLDEND'; worldEndT=210; }
        else { levelClear(); }
      }
    }
  } else if(state==='CLEAR'){ clearTimer++; updateStuff();
    player.vx=0; player.x += 1.5; player.animT+=0.3; updateCam(); }
  else if(state==='WORLDCARD'){ worldCardT--; if(worldCardT<=0) state='PLAY'; }
  else if(state==='BOSSCARD'){ bossCardT--; if(bossCardT<=0) state='PLAY'; }
  else if(state==='WORLDEND'){ worldEndT--; if(worldEndT<=0) startLevel(levelIdx+1); }
  else if(state==='PAUSE'){ /* fisica congelata */ }
  // render
  ctx.save();
  if(shake>0){ shake--; ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake); }
  if(state==='MENU'){ drawMenu(); }
  else if(state==='TITLE'){ drawTitle(); }
  else if(state==='SETTINGS'){ drawSettings(); }
  else if(state==='WORLDMAP'){ drawWorldMap(); }
  else if(state==='INTRO'){ drawIntro(); }
  else if(state==='CREDITS'){ drawCredits(); }
  else {
    drawSky(world.cfg); drawTiles(); drawStuff(); drawEnemies(); drawPlayer(); drawHUD();
    if(state==='WORLDCARD'){
      const wi = WORLD_INFO[LEVELS[levelIdx].world] || WORLD_INFO[1];
      ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.font='bold 38px Courier New'; ctx.fillStyle=wi.col;
      ctx.fillText(wi.title, W/2, H/2-30+Math.sin(frame*0.05)*4);
      ctx.font='18px Courier New'; ctx.fillStyle='#fff';
      ctx.fillText(wi.sub, W/2, H/2+15);
      ctx.font='bold 16px Courier New'; ctx.fillStyle='#7dff8a';
      ctx.fillText('PREMI SPAZIO PER CONTINUARE', W/2, H/2+60+Math.sin(frame*0.1)*3);
    }
    if(state==='BOSSCARD'){
      const bk = LEVELS[levelIdx].bossKind || 'melmone';
      const pal = BOSS_PAL[bk] || BOSS_PAL.melmone;
      ctx.fillStyle='rgba(20,0,10,.8)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.font='bold 30px Courier New'; ctx.fillStyle=pal.crown;
      ctx.fillText('⚠ '+BOSS_NAMES[bk]+' ⚠', W/2, H/2-40+Math.sin(frame*0.08)*4);
      ctx.font='16px Courier New'; ctx.fillStyle='#fff';
      wrapText(BOSS_TAUNTS[bk]||'', W/2, H/2+10, 560, 22);
      ctx.font='bold 16px Courier New'; ctx.fillStyle='#7dff8a';
      ctx.fillText('PREMI SPAZIO PER COMBATTERE', W/2, H/2+70+Math.sin(frame*0.1)*3);
    }
    if(state==='WORLDEND'){
      const curW = LEVELS[levelIdx].world;
      const nextW = LEVELS[Math.min(levelIdx+1,LEVELS.length-1)].world;
      const nextInfo = WORLD_INFO[nextW] || WORLD_INFO[1];
      const t = 210 - worldEndT; // 0..210, progressione dell'animazione
      const dark = Math.min(0.85, t/60);
      ctx.fillStyle='rgba(5,0,15,'+dark+')'; ctx.fillRect(0,0,W,H);
      // crepe di fulmine che attraversano lo schermo dopo un attimo
      if(t>40){
        ctx.strokeStyle='rgba(255,230,120,'+Math.max(0,1-((t-40)%50)/50)+')'; ctx.lineWidth=3;
        ctx.beginPath();
        let lx=100+((frame*37)%700), ly=0;
        ctx.moveTo(lx,ly);
        for(let i=0;i<6;i++){ lx += (Math.sin(frame*0.3+i)*40); ly += H/6; ctx.lineTo(lx,ly); }
        ctx.stroke();
      }
      ctx.textAlign='center';
      if(t>25){
        ctx.font='bold 34px Courier New'; ctx.fillStyle='#ff9de0';
        ctx.globalAlpha = Math.min(1,(t-25)/40);
        ctx.fillText('MONDO '+curW+' LIBERATO!', W/2, H/2-70);
        ctx.globalAlpha=1;
      }
      if(t>70){
        ctx.font='bold 20px Courier New'; ctx.fillStyle='#ff4d6d';
        ctx.globalAlpha = Math.min(1,(t-70)/40);
        ctx.fillText('...MA QUALCOSA DI PEGGIO TI ASPETTA.', W/2, H/2-20);
        ctx.globalAlpha=1;
      }
      if(t>110){
        ctx.globalAlpha = Math.min(1,(t-110)/40);
        ctx.font='bold 26px Courier New'; ctx.fillStyle=nextInfo.col;
        ctx.fillText('PROSSIMA TAPPA: '+nextInfo.title, W/2, H/2+40+Math.sin(frame*0.08)*4);
        ctx.globalAlpha=1;
      }
      if(t>160){
        ctx.font='bold 15px Courier New'; ctx.fillStyle='#7dff8a';
        ctx.fillText('PREMI SPAZIO PER CONTINUARE', W/2, H/2+90+Math.sin(frame*0.1)*3);
      }
    }
    if(state==='CLEAR') overlayScreen('LIVELLO COMPLETATO!',
      'Bonus tempo: +'+Math.floor(timeLeft/60)*10+' punti'+(perfectCoins?'  ·  ★ MONETE PERFETTE! +1000':''), '#ffd60a');
    if(state==='PAUSE'){
      ctx.fillStyle='rgba(0,0,0,.65)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.font='bold 40px Courier New'; ctx.fillStyle='#ffd60a';
      ctx.fillText('PAUSA', W/2, H/2-20);
      ctx.font='bold 16px Courier New'; ctx.fillStyle='#7dff8a';
      ctx.fillText('PREMI P PER RIPRENDERE', W/2, H/2+25);
      ctx.font='13px Courier New'; ctx.fillStyle='#9ae6ff';
      ctx.fillText('M: torna alla mappa del mondo', W/2, H/2+55);
    }
    if(state==='GAMEOVER') overlayScreen('GAME OVER', 'Punteggio finale: '+score, '#ff4d6d');
    if(state==='WIN') overlayScreen('★ HAI VINTO! ★', 'Il Regno delle Bacche è salvo! Punti: '+score, '#7dff8a');
  }
  ctx.restore();
  requestAnimationFrame(tick);
}
tick();
</script>
