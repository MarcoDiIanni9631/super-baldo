<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SUPER BALDO — Il Regno delle Bacche</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#1a0f2e; overflow:hidden; touch-action:none;
    font-family:'Courier New', monospace; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { background:#000; image-rendering:pixelated; max-width:100vw; max-height:100vh;
    box-shadow:0 0 60px rgba(255,180,60,.25); }
  #touch { position:fixed; inset:0; pointer-events:none; display:none; }
  .tbtn { position:absolute; width:74px; height:74px; border-radius:50%;
    background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.35);
    color:#fff; font-size:26px; font-weight:bold; pointer-events:auto;
    display:flex; align-items:center; justify-content:center; user-select:none;
    -webkit-user-select:none; }
  .tbtn:active { background:rgba(255,255,255,.35); }
  #bL{ left:18px; bottom:96px; } #bR{ left:104px; bottom:96px; }
  #bJ{ right:18px; bottom:110px; } #bX{ right:104px; bottom:40px; }
  @media (pointer:coarse){ #touch{ display:block; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="960" height="540"></canvas></div>
<div id="touch">
  <div class="tbtn" id="bL">◀</div><div class="tbtn" id="bR">▶</div>
  <div class="tbtn" id="bJ">▲</div><div class="tbtn" id="bX">✦</div>
</div>
<script>
'use strict';
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height, TILE = 36;

/* ============================= AUDIO ============================= */
let AC = null, musicOn = true, musicTimer = null, musicStep = 0;
function audio(){ if(!AC){ AC = new (window.AudioContext||window.webkitAudioContext)(); startMusic(); } if(AC.state==='suspended') AC.resume(); }
function beep(freq, dur, type='square', vol=0.08, slide=0){
  if(!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
}
const SFX = {
  jump: ()=>beep(300,.18,'square',.07,300),
  jump2: ()=>beep(420,.15,'square',.07,320),
  coin: ()=>{ beep(1000,.07,'square',.06); setTimeout(()=>beep(1400,.16,'square',.06),60); },
  stomp: ()=>beep(220,.12,'triangle',.12,-140),
  power: ()=>{ [520,660,780,1040].forEach((f,i)=>setTimeout(()=>beep(f,.12,'square',.07),i*70)); },
  hurt: ()=>beep(200,.3,'sawtooth',.09,-140),
  fire: ()=>beep(700,.09,'sawtooth',.05,-400),
  brick: ()=>beep(160,.1,'square',.09,-80),
  bump: ()=>beep(120,.08,'square',.08),
  die: ()=>{ [440,330,220,140].forEach((f,i)=>setTimeout(()=>beep(f,.2,'triangle',.09),i*130)); },
  flag: ()=>{ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.16,'square',.07),i*90)); },
  boss: ()=>beep(90,.4,'sawtooth',.12,-40),
  shield: ()=>beep(880,.2,'triangle',.08,120),
};
const MELODY = [392,0,523,0,659,523,784,0, 659,0,523,392,440,494,523,0,
                330,0,392,0,523,440,392,0, 349,392,440,0,494,440,392,0];
const BASS   = [131,0,131,0,165,0,165,0, 147,0,147,0,110,0,123,0];
function startMusic(){
  if(musicTimer) return;
  musicTimer = setInterval(()=>{
    if(!musicOn || !AC || state==='MENU') return;
    const m = MELODY[musicStep % MELODY.length];
    const b = BASS[musicStep % BASS.length];
    if(m) beep(m,.14,'square',.028);
    if(b) beep(b,.2,'triangle',.05);
    musicStep++;
  }, 150);
}

/* ============================= INPUT ============================= */
const keys = {};
window.addEventListener('keydown', e=>{
  audio();
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
  if(e.key===' ') keys['space'] = true;
  handleUIKey(e.key);
});
window.addEventListener('keyup', e=>{
  keys[e.key.toLowerCase()] = false;
  if(e.key===' ') keys['space'] = false;
});
function bindTouch(id, key){
  const el = document.getElementById(id);
  const on = e=>{ e.preventDefault(); audio(); keys[key]=true; if(key==='space') handleUIKey(' '); };
  const off = e=>{ e.preventDefault(); keys[key]=false; };
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
}
bindTouch('bL','arrowleft'); bindTouch('bR','arrowright');
bindTouch('bJ','space'); bindTouch('bX','x');
cv.addEventListener('pointerdown', e=>{
  audio();
  const r = cv.getBoundingClientRect();
  const mx = (e.clientX-r.left)*(W/r.width), my = (e.clientY-r.top)*(H/r.height);
  handleClick(mx,my);
});
const left  = ()=>keys['arrowleft']||keys['a'];
const right = ()=>keys['arrowright']||keys['d'];
const jumpK = ()=>keys['space']||keys['arrowup']||keys['w'];
const fireK = ()=>keys['x']||keys['k'];

/* ============================= PERSONAGGI ============================= */
const CHARS = [
  { name:'BALDO',    desc:'Equilibrato e affidabile', color:'#ff5a36', color2:'#ffb08a',
    speed:1.3, jump:1.34, hits:0, note:'Il classico eroe' },
  { name:'ZIPPA',    desc:'Velocissima, salto corto', color:'#2ee6d6', color2:'#b8fff7',
    speed:1.50, jump:1.30, hits:0, note:'Corre come il vento' },
  { name:'BRONTOLO', desc:'Lento ma tosto: +1 cuore, spacca le casse', color:'#a06bff', color2:'#d8c2ff',
    speed:0.82, jump:1.30, hits:1, note:'Un carro armato peloso' },
];

/* ============================= LIVELLI =============================
   # terra  X pietra  B cassa  ? blocco moneta  M blocco power-up
   = piattaforma  ^ spuntoni  L lava  c moneta
   e gnappo  s spino  f svolazzo  j molla  G BOSS
   P start  F traguardo
==================================================================== */
const LEVELS = [
{ name:'1. PRATI SALTERINI', time:300, sky:['#66ccff','#cceeff'], hills:'#3fa34d',
rows:[
'                                                                                                                                                            ',
'                                                                                                                                                            ',
'                  c c c                                        ccc                                                                                          ',
'                                        M                                            ?                                                                      ',
'          ?                B?B                     =====                 B B B                          c c c                                      F        ',
'                                                                                          ?M?                          =                          F        ',
'   P       ?                         c c        =                =                                    =======              =                       F        ',
'                            e                                                  e   e                                            c c               F        ',
'        c c          e            ====== =    =        c c c          ======                   j            s        =====          e    e        F        ',
'                                                                ===                                                                                F        ',
'################   ######### ##      ##   ##  ## ############ ### ############### ######   ######## ######## ####  #### ######  ##################X#####   ',
'################   ######### ##      ##   ##  ## ############ ### ############### ######   ######## ######## ####  #### ######  ##################X#####   ',
'################   ######### ##      ##   ##  ## ############ ### ############### ######   ######## ######## ####  #### ######  ##################X#####   ',
'################   ######### ##      ##   ##  ## ############ ### ############### ######   ######## ######## ####  #### ######  ##################X#####   ',
]},
{ name:'2. GROTTE ROVENTI', time:280, sky:['#2b1230','#5a1e3a'], hills:'#3a1226',
rows:[
'XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
'                                                                                                                                            ',
'                                        c c c                           c c                                         c c c                   ',
'                       M                                    ?                                  M           e      ^^                    F   ',
'                      =====                               =====                               =====                           =====     F   ',
'                                    j               B?B                                                                                 F   ',
'   P        ====               ====             ====              ====              ====             ====             ====              F   ',
'                    e     ^^                e                  s          e ^^              e     s          e ^^                       F   ',
'XXXXXXXXXXXX    XXXXXXXXXXXXXX    XXXXXXXXXXXXXX   XXXXXXXXXXXXXXX    XXXXXXXXXXXXXX    XXXXXXXXXXXXX    XXXXXXXXXXXXX    XXXXXXXXXXXXXXXXXX',
'XXXXXXXXXXXX    XXXXXXXXXXXXXX    XXXXXXXXXXXXXX   XXXXXXXXXXXXXXX    XXXXXXXXXXXXXX    XXXXXXXXXXXXX    XXXXXXXXXXXXX    XXXXXXXXXXXXXXXXXX',
'XXXXXXXXXXXXLLLLXXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXXLLLXXXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXXXXXX',
'XXXXXXXXXXXXLLLLXXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXXLLLXXXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXLLLLXXXXXXXXXXXXXXXXXX',
]},
{ name:'3. CIELO TEMPESTOSO', time:280, sky:['#1a2a6c','#4a3f9f'], hills:'#26205e',
rows:[
'                                                                                                                                            ',
'                               c c c                                                   c c c                                                ',
'                              =====                                                   =====                                                 ',
'                  M                                    B?B               ?                          M                                  F    ',
'                 ====                        ====                       ====                       ====                       ====     F    ',
'            f                          f      c c                 f                          f                        f        c c     F    ',
'   P      ===          ===           ===           ===          ===           ===          ===           ===          ===              F    ',
'                              e                 j         e           s             e                           e            j         F    ',
'XXXXXXXXXX   XXXXXXXXX    XXXXXXXXXX    XXXXXXXXXX    XXXXXXXXX    XXXXXXXXXX    XXXXXXXXX    XXXXXXXXXX    XXXXXXXXX    XXXXXXXXXXXXXXXXXXX',
'XXXXXXXXXX   XXXXXXXXX    XXXXXXXXXX    XXXXXXXXXX    XXXXXXXXX    XXXXXXXXXX    XXXXXXXXX    XXXXXXXXXX    XXXXXXXXX    XXXXXXXXXXXXXXXXXXX',
'                                                                                                                                            ',
'                                                                                                                                            ',
]},
{ name:'BOSS: RE MELMONE', time:200, sky:['#30071a','#6b0f2a'], hills:'#22030f', boss:true,
rows:[
'XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
'X                                     X',
'X                                     X',
'X   M                            M    X',
'X                                     X',
'X        XXXX          XXXX          X',
'X                G                    X',
'X  P                                  X',
'X                                     X',
'XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
]},
];

/* ============================= STATO GIOCO ============================= */
let state = 'MENU';        // MENU, PLAY, CLEAR, GAMEOVER, WIN
let charIdx = 0, levelIdx = 0;
let score = 0, coins = 0, lives = 3, timeLeft = 0;
let world = null, player = null, cam = {x:0,y:0};
let particles = [], floats = [], shake = 0, clearTimer = 0, frame = 0;

const SOLID = ch => '#XB?M'.includes(ch);

function buildWorld(idx){
  const L = LEVELS[idx];
  const rows = L.rows.map(r=>r.split(''));
  const w = Math.max(...rows.map(r=>r.length));
  const ents = []; let start = {x:2,y:2}; let flag = null; let boss = null;
  for(let y=0;y<rows.length;y++) for(let x=0;x<w;x++){
    const ch = rows[y][x]||' ';
    if(ch==='P'){ start={x,y}; rows[y][x]=' '; }
    if(ch==='F'){ flag={x,y}; rows[y][x]=' '; }
    if('esfj'.includes(ch)){ ents.push(makeEnemy(ch,x,y)); rows[y][x]=' '; }
    if(ch==='G'){ boss = makeBoss(x,y); ents.push(boss); rows[y][x]=' '; }
  }
  return { rows, w, h:rows.length, ents, start, flag, boss,
           fireballs:[], items:[], cfg:L };
}
const tileAt = (w,x,y)=> (x<0) ? 'X' : ((y<0||y>=w.h||x>=w.w) ? ' ' : (w.rows[y][x]||' '));

/* ============================= ENTITÀ ============================= */
function makeEnemy(ch,x,y){
  const base = { x:x*TILE, y:y*TILE, w:30, h:30, vx:-1.1, vy:0, dead:0, type:ch, t:Math.random()*99 };
  if(ch==='s'){ base.w=32; base.h=26; base.vx=-0.8; }
  if(ch==='f'){ base.fly=true; base.baseY=y*TILE; base.vx=-1.4; }
  if(ch==='j'){ base.vx=0; base.jumpT=60+Math.random()*40; base.homeX=x*TILE; }
  return base;
}
function makeBoss(x,y){
  return { x:x*TILE, y:y*TILE-40, w:110, h:96, vx:0, vy:0, dead:0, type:'G',
           hp:6, maxhp:6, phase:'idle', pt:90, flash:0, t:0 };
}
function makePlayer(){
  const c = CHARS[charIdx];
  return { x:0, y:0, w:26, h:32, vx:0, vy:0, onGround:false, face:1,
    big:false, flame:false, feather:false, shield:false, star:0,
    extraHits:c.hits, jumps:0, coyote:0, jbuf:0, inv:0, fireCd:0,
    dead:false, deadT:0, animT:0, c };
}
function spawnPlayer(){
  player = Object.assign(makePlayer(), player ? {
    big:player.big, flame:player.flame, feather:player.feather,
    shield:player.shield, extraHits:player.extraHits } : {});
  player.x = world.start.x*TILE+4; player.y = world.start.y*TILE;
  player.h = player.big ? 44 : 32;
  cam.x = Math.max(0, player.x - W/3); cam.y = 0;
}
function startLevel(i){
  levelIdx = i; world = buildWorld(i); timeLeft = LEVELS[i].time*60;
  particles=[]; floats=[]; spawnPlayer(); state='PLAY';
}

/* ============================= PARTICELLE ============================= */
function puff(x,y,col,n=8,spd=3){
  for(let i=0;i<n;i++) particles.push({ x,y, vx:(Math.random()-.5)*spd*2,
    vy:(Math.random()-.8)*spd*2, life:24+Math.random()*18, col, r:2+Math.random()*3 });
}
function floatText(x,y,txt,col='#fff'){ floats.push({x,y,txt,col,life:50}); }
function addScore(n,x,y){ score+=n; if(x!==undefined) floatText(x,y,'+'+n,'#ffe066'); }

/* ============================= FISICA ============================= */
const GRAV = 0.55, MAXFALL = 13;
function rectVsTiles(e, cb){
  const x0 = Math.floor(e.x/TILE), x1 = Math.floor((e.x+e.w-0.01)/TILE);
  const y0 = Math.floor(e.y/TILE), y1 = Math.floor((e.y+e.h-0.01)/TILE);
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++) cb(tx,ty,tileAt(world,tx,ty));
}
function moveEntity(e, oneway=false){
  // orizzontale
  e.x += e.vx;
  rectVsTiles(e,(tx,ty,ch)=>{
    if(SOLID(ch)){
      if(e.vx>0){ e.x = tx*TILE - e.w; } else if(e.vx<0){ e.x = (tx+1)*TILE; }
      e.hitWall = true;
    }
  });
  // verticale
  e.onGround = false;
  const prevBottom = e.y + e.h;
  e.y += e.vy;
  rectVsTiles(e,(tx,ty,ch)=>{
    if(SOLID(ch)){
      if(e.vy>0){ e.y = ty*TILE - e.h; e.vy=0; e.onGround=true; }
      else if(e.vy<0){ e.y = (ty+1)*TILE; e.vy=0; e.bumped={tx,ty,ch}; }
    } else if(oneway && ch==='=' && e.vy>0){
      const top = ty*TILE;
      if(prevBottom <= top+1 && e.y+e.h > top){ e.y = top - e.h; e.vy=0; e.onGround=true; }
    }
  });
}
const overlap = (a,b)=> a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

/* ============================= BLOCCHI ============================= */
function hitBlock(tx,ty,ch){
  const px = tx*TILE+TILE/2, py = ty*TILE;
  if(ch==='?'){
    world.rows[ty][tx]='X'; SFX.coin(); coins++; addScore(100,px,py);
    puff(px,py,'#ffd94a',10);
    if(coins>=50){ coins-=50; lives++; SFX.power(); floatText(px,py-20,'1UP!','#7dff8a'); }
  } else if(ch==='M'){
    world.rows[ty][tx]='X'; SFX.power();
    const pool = ['bacca','fiamma','piuma','stella','scudo'];
    const kind = pool[Math.floor(Math.random()*pool.length)];
    world.items.push({ x:tx*TILE+4, y:ty*TILE-30, w:28, h:28, vx:1.2, vy:-3, kind });
    puff(px,py,'#ff9de0',10);
  } else if(ch==='B'){
    const canBreak = player.big || player.c.name==='BRONTOLO';
    if(canBreak){ world.rows[ty][tx]=' '; SFX.brick(); addScore(50,px,py);
      puff(px,py,'#b5793d',14,4); shake=6; }
    else SFX.bump();
  } else SFX.bump();
}

/* ============================= POWER-UP ============================= */
const ITEM_INFO = {
  bacca:{ col:'#ff4d6d', label:'BACCA GIGANTE' },
  fiamma:{ col:'#ff9f1c', label:'FIAMMA' },
  piuma:{ col:'#4cc9f0', label:'PIUMA DOPPIA' },
  stella:{ col:'#ffd60a', label:'SUPER STELLA' },
  scudo:{ col:'#57e389', label:'SCUDO' },
};
function applyItem(kind){
  SFX.power(); addScore(500,player.x,player.y-10);
  floatText(player.x, player.y-26, ITEM_INFO[kind].label, ITEM_INFO[kind].col);
  if(kind==='bacca'){ if(!player.big){ player.big=true; player.h=44; player.y-=12; } }
  if(kind==='fiamma') player.flame = true;
  if(kind==='piuma') player.feather = true;
  if(kind==='stella'){ player.star = 8*60; }
  if(kind==='scudo'){ player.shield = true; SFX.shield(); }
}
function hurtPlayer(){
  if(player.inv>0 || player.star>0 || player.dead) return;
  if(player.shield){ player.shield=false; SFX.shield(); player.inv=90; puff(player.x+13,player.y+16,'#57e389',12); return; }
  if(player.flame){ player.flame=false; SFX.hurt(); player.inv=90; return; }
  if(player.big){ player.big=false; player.h=32; SFX.hurt(); player.inv=90; return; }
  if(player.extraHits>0){ player.extraHits--; SFX.hurt(); player.inv=90; return; }
  killPlayer();
}
function killPlayer(){
  if(player.dead) return;
  player.dead=true; player.deadT=0; player.vy=-11; SFX.die(); shake=10;
}

/* ============================= UPDATE ============================= */
function updatePlayer(){
  const p = player, c = p.c;
  if(p.dead){
    p.deadT++; p.vy += GRAV; p.y += p.vy;
    if(p.deadT>110){
      lives--;
      if(lives<0){ state='GAMEOVER'; }
      else { p.big=false; p.flame=false; p.feather=false; p.shield=false;
             p.extraHits=c.hits; spawnPlayer(); player.inv=90; }
    }
    return;
  }
  // corsa
  const acc = 0.6*c.speed, maxV = 4.6*c.speed;
  if(left()){ p.vx -= acc; p.face=-1; } else if(right()){ p.vx += acc; p.face=1; }
  else p.vx *= p.onGround ? 0.78 : 0.94;
  p.vx = Math.max(-maxV, Math.min(maxV, p.vx));
  // salto: coyote time + buffer
  p.coyote = p.onGround ? 7 : Math.max(0,p.coyote-1);
  p.jbuf = jumpK() ? (p.jbufHeld ? p.jbuf : 7) : 0;
  if(jumpK() && !p.jbufHeld){
    if(p.coyote>0){ p.vy = -11.6*c.jump; p.jumps=1; SFX.jump(); puff(p.x+13,p.y+p.h,'#fff',5,2); }
    else if(p.feather && p.jumps===1){ p.vy = -10.2*c.jump; p.jumps=2; SFX.jump2(); puff(p.x+13,p.y+p.h,'#4cc9f0',8,2); }
  }
  p.jbufHeld = jumpK();
  if(!jumpK() && p.vy < -6.5) p.vy = -6.5; // salto variabile (con minimo dignitoso)
  p.vy = Math.min(MAXFALL, p.vy + GRAV);
  // fuoco
  p.fireCd = Math.max(0,p.fireCd-1);
  if(p.flame && fireK() && p.fireCd===0){
    p.fireCd = 22; SFX.fire();
    world.fireballs.push({ x:p.x+(p.face>0?p.w:-10), y:p.y+10, w:12, h:12,
      vx:8*p.face, vy:-2, life:80 });
  }
  p.bumped = null;
  moveEntity(p, true);
  if(p.onGround) p.jumps = 0;
  if(p.bumped) hitBlock(p.bumped.tx, p.bumped.ty, p.bumped.ch);
  // tile speciali
  rectVsTiles(p,(tx,ty,ch)=>{
    if(ch==='c'){ world.rows[ty][tx]=' '; coins++; addScore(100); SFX.coin();
      puff(tx*TILE+18,ty*TILE+18,'#ffd94a',6);
      if(coins>=50){ coins-=50; lives++; SFX.power(); floatText(p.x,p.y-20,'1UP!','#7dff8a'); } }
    if(ch==='^' ){ hurtPlayer(); if(!p.dead) p.vy=-8; }
    if(ch==='L'){ if(p.star>0){ p.vy=-12; } else killPlayer(); }
  });
  // caduta nel vuoto
  if(p.y > world.h*TILE + 100) killPlayer();
  // traguardo
  if(world.flag){
    const f = { x:world.flag.x*TILE+8, y:0, w:20, h:world.h*TILE };
    if(overlap(p,f) && state==='PLAY'){ levelClear(); }
  }
  if(p.star>0){ p.star--; if(p.star%5===0) puff(p.x+13+((Math.random()-.5)*20), p.y+16, ['#ff4d6d','#ffd60a','#4cc9f0','#57e389'][frame%4],1,1); }
  if(p.inv>0) p.inv--;
  p.animT += Math.abs(p.vx)*0.15;
}
function levelClear(){
  SFX.flag(); state='CLEAR'; clearTimer=0;
  addScore(1000 + Math.floor(timeLeft/60)*10, player.x, player.y-20);
}

function updateEnemies(){
  for(const e of world.ents){
    if(e.dead){ e.dead++; e.y += 3; continue; }
    e.t++;
    if(e.type==='G'){ updateBoss(e); continue; }
    if(e.type==='f'){
      e.x += e.vx; e.y = e.baseY + Math.sin(e.t*0.05)*46;
      const aheadCh = tileAt(world, Math.floor((e.x+(e.vx<0?-2:e.w+2))/TILE), Math.floor((e.y+e.h/2)/TILE));
      if(e.x < 0 || SOLID(aheadCh)) e.vx*=-1;
    } else if(e.type==='j'){
      e.vy = Math.min(MAXFALL, e.vy+GRAV);
      if(e.onGround){ e.jumpT--; if(e.jumpT<=0){ e.vy=-9.5; e.jumpT=70+Math.random()*50;
        const near = Math.abs(player.x-e.x)<380;
        const tgt = near ? player.x : e.homeX;   // insegue solo da vicino, poi torna a casa
        e.vx = (tgt>e.x?1:-1)*(near?1.6:1.2); } else e.vx=0; }
      e.hitWall=false; moveEntity(e); if(e.hitWall) e.vx*=-1;
    } else {
      e.vy = Math.min(MAXFALL, e.vy+GRAV);
      e.hitWall=false; moveEntity(e);
      if(e.hitWall) e.vx*=-1;
      // non cadere dai bordi (gnappo furbo ogni tanto)
      if(e.onGround && e.type==='e'){
        const ahead = tileAt(world, Math.floor((e.x + (e.vx>0?e.w+2:-2))/TILE), Math.floor((e.y+e.h+2)/TILE));
        if(!SOLID(ahead) && ahead!=='=') e.vx*=-1;
      }
    }
    // collisione col giocatore
    if(!player.dead && player.inv===0 && overlap(player,e)){
      const stompable = e.type!=='s';
      const falling = player.vy > 1 && (player.y+player.h) - e.y < 22;
      if(player.star>0){
        e.dead=1; SFX.stomp(); addScore(300,e.x,e.y); puff(e.x+15,e.y+15,'#ffd60a',12);
      } else if(stompable && falling){
        e.dead=1; player.vy=-9; SFX.stomp(); addScore(200,e.x,e.y); puff(e.x+15,e.y+15,'#fff',8);
      } else hurtPlayer();
    }
  }
  world.ents = world.ents.filter(e=>e.dead<40 && e.y < world.h*TILE+300);
}

function updateBoss(b){
  b.t++; b.pt--; if(b.flash>0) b.flash--;
  const dir = player.x > b.x ? 1 : -1;
  if(b.phase==='idle'){
    b.vx *= 0.9;
    if(b.pt<=0){ b.phase = (b.hp<=3 && Math.random()<0.4) ? 'spawn' : 'jump'; b.pt=1; }
  } else if(b.phase==='jump'){
    if(b.onGround){ b.vy = -13; b.vx = dir* (2.2 + (6-b.hp)*0.35); SFX.boss(); b.phase='air'; }
  } else if(b.phase==='air'){
    if(b.onGround && b.vy>=0){ shake=12; SFX.boss(); puff(b.x+b.w/2,b.y+b.h,'#8a1538',16,5);
      b.phase='idle'; b.pt = 60 + Math.random()*50; b.vx=0; }
  } else if(b.phase==='spawn'){
    world.ents.push(makeEnemy('e', Math.floor((b.x+b.w/2)/TILE), Math.floor(b.y/TILE)));
    SFX.boss(); b.phase='idle'; b.pt=90;
  }
  b.vy = Math.min(MAXFALL, b.vy+GRAV);
  moveEntity(b);
  if(!player.dead && player.inv===0 && overlap(player,b)){
    const falling = player.vy>1 && (player.y+player.h)-b.y < 30;
    if(falling || player.star>0){ damageBoss(b); player.vy=-11; }
    else hurtPlayer();
  }
}
function damageBoss(b){
  if(b.flash>0) return;
  b.hp--; b.flash=40; SFX.stomp(); shake=10; addScore(500,b.x+b.w/2,b.y);
  puff(b.x+b.w/2,b.y+20,'#ff4d6d',16,5);
  if(b.hp<=0){ b.dead=1; addScore(5000,b.x,b.y); SFX.flag();
    setTimeout(()=>{ state='WIN'; },900); }
}

function updateStuff(){
  // fireballs
  for(const f of world.fireballs){
    f.life--; f.vy = Math.min(9, f.vy+0.35);
    f.x += f.vx; f.y += f.vy;
    const tch = tileAt(world, Math.floor((f.x+6)/TILE), Math.floor((f.y+12)/TILE));
    if(SOLID(tch)){ f.vy = -6; }
    const sideCh = tileAt(world, Math.floor((f.x+(f.vx>0?12:0))/TILE), Math.floor((f.y+6)/TILE));
    if(SOLID(sideCh)){ f.life=0; puff(f.x,f.y,'#ff9f1c',6); }
    for(const e of world.ents){
      if(!e.dead && overlap(f,e)){
        f.life=0; puff(f.x,f.y,'#ff9f1c',8);
        if(e.type==='G') damageBoss(e);
        else { e.dead=1; SFX.stomp(); addScore(200,e.x,e.y); }
      }
    }
    if(f.life<=0 || f.y>world.h*TILE) f.gone=true;
  }
  world.fireballs = world.fireballs.filter(f=>!f.gone);
  // items
  for(const it of world.items){
    it.vy = Math.min(8, it.vy+0.3);
    it.hitWall=false; moveEntity(it);
    if(it.hitWall) it.vx*=-1;
    if(it.kind==='stella' && it.onGround) it.vy=-7;
    if(overlap(player,it) && !player.dead){ it.gone=true; applyItem(it.kind); }
    if(it.y>world.h*TILE+80) it.gone=true;
  }
  world.items = world.items.filter(i=>!i.gone);
  // particelle
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; }
  particles = particles.filter(p=>p.life>0);
  for(const f of floats){ f.y-=0.8; f.life--; }
  floats = floats.filter(f=>f.life>0);
}

function updateCam(){
  const tx = player.x - W/2 + 40*player.face;
  cam.x += (tx - cam.x)*0.1;
  cam.x = Math.max(0, Math.min(world.w*TILE - W, cam.x));
  const ty = player.y - H/2;
  cam.y += (ty - cam.y)*0.08;
  cam.y = Math.max(-40, Math.min(world.h*TILE - H + 40, cam.y));
  if(world.h*TILE < H) cam.y = world.h*TILE - H;
}

/* ============================= RENDER ============================= */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); }
function drawSky(cfg){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,cfg.sky[0]); g.addColorStop(1,cfg.sky[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // colline parallasse
  ctx.fillStyle = cfg.hills;
  for(let i=0;i<8;i++){
    const hx = ((i*340 - cam.x*0.3)%(W+400))-200;
    ctx.beginPath(); ctx.arc(hx, H-40, 150+((i*77)%90), Math.PI, 0); ctx.fill();
  }
  // nuvole / stelle
  ctx.fillStyle='rgba(255,255,255,.75)';
  for(let i=0;i<7;i++){
    const nx = ((i*290 - cam.x*0.15 + 9999)%(W+300))-150;
    const ny = 40 + (i*53)%140;
    if(levelIdx===1){ ctx.fillRect(nx,ny,3,3); }
    else { rr(nx,ny,90,24,12); rr(nx+20,ny-14,50,22,11); }
  }
}
function drawTiles(){
  const x0 = Math.floor(cam.x/TILE), x1 = Math.ceil((cam.x+W)/TILE);
  const y0 = Math.max(0,Math.floor(cam.y/TILE)), y1 = Math.min(world.h-1, Math.ceil((cam.y+H)/TILE));
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++){
    const ch = tileAt(world,tx,ty);
    if(ch===' ') continue;
    const x = tx*TILE - cam.x, y = ty*TILE - cam.y;
    if(ch==='#'){ ctx.fillStyle='#7a4a21'; ctx.fillRect(x,y,TILE,TILE);
      if(!SOLID(tileAt(world,tx,ty-1))){ ctx.fillStyle='#4caf50'; ctx.fillRect(x,y,TILE,9); }
      ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(x+4,y+16,10,8); ctx.fillRect(x+20,y+24,9,7); }
    else if(ch==='X'){ ctx.fillStyle='#6b7280'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle='#9aa3af'; ctx.fillRect(x+2,y+2,TILE-4,4);
      ctx.fillStyle='rgba(0,0,0,.2)'; ctx.fillRect(x+3,y+20,12,9); }
    else if(ch==='B'){ ctx.fillStyle='#b5793d'; rr(x+1,y+1,TILE-2,TILE-2,4);
      ctx.strokeStyle='#7a4a21'; ctx.lineWidth=3;
      ctx.strokeRect(x+5,y+5,TILE-10,TILE-10);
      ctx.beginPath(); ctx.moveTo(x+5,y+5); ctx.lineTo(x+TILE-5,y+TILE-5);
      ctx.moveTo(x+TILE-5,y+5); ctx.lineTo(x+5,y+TILE-5); ctx.stroke(); }
    else if(ch==='?'||ch==='M'){
      const bounce = Math.sin(frame*0.12 + tx)*2;
      ctx.fillStyle = ch==='?' ? '#f2b705' : '#e055c3';
      rr(x+2,y+2+bounce,TILE-4,TILE-4,6);
      ctx.fillStyle='#fff'; ctx.font='bold 20px Courier New'; ctx.textAlign='center';
      ctx.fillText(ch==='?'?'★':'♦', x+TILE/2, y+26+bounce); }
    else if(ch==='='){ ctx.fillStyle='#c98f4e'; rr(x,y+2,TILE,12,4);
      ctx.fillStyle='#8a5a2a'; ctx.fillRect(x+4,y+10,4,4); ctx.fillRect(x+26,y+10,4,4); }
    else if(ch==='c'){
      const b = Math.sin(frame*0.1+tx*2)*3;
      ctx.fillStyle='#ffd94a'; ctx.beginPath();
      ctx.ellipse(x+TILE/2, y+TILE/2+b, 9, 12, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#c79a00'; ctx.fillRect(x+TILE/2-2, y+TILE/2-7+b, 4, 14); }
    else if(ch==='^'){ ctx.fillStyle='#cbd5e1';
      for(let i=0;i<3;i++){ ctx.beginPath();
        ctx.moveTo(x+i*12, y+TILE); ctx.lineTo(x+i*12+6, y+8); ctx.lineTo(x+i*12+12, y+TILE);
        ctx.fill(); } }
    else if(ch==='L'){
      ctx.fillStyle='#ff4400'; ctx.fillRect(x,y+6,TILE,TILE-6);
      ctx.fillStyle='#ffaa00';
      ctx.fillRect(x, y+4+Math.sin(frame*0.15+tx)*3, TILE, 6);
      if(Math.random()<0.02) puff(x+Math.random()*TILE, y+4, '#ffaa00',1,1.5); }
  }
  // bandiera traguardo
  if(world.flag){
    const fx = world.flag.x*TILE - cam.x + 14;
    ctx.fillStyle='#e5e7eb'; ctx.fillRect(fx, 0-cam.y, 6, world.h*TILE);
    const fy = (world.flag.y)*TILE - cam.y + Math.sin(frame*0.08)*4;
    ctx.fillStyle='#ff4d6d'; ctx.beginPath();
    ctx.moveTo(fx+6,fy); ctx.lineTo(fx+52,fy+14); ctx.lineTo(fx+6,fy+28); ctx.fill();
  }
}
function drawPlayer(){
  const p = player;
  if(p.inv>0 && frame%6<3 && !p.dead) return;
  const x = p.x - cam.x, y = p.y - cam.y;
  let col = p.c.color, col2 = p.c.color2;
  if(p.star>0){ col = ['#ff4d6d','#ffd60a','#4cc9f0','#57e389'][Math.floor(frame/4)%4]; }
  else if(p.flame){ col2 = '#ffdd99'; }
  ctx.save();
  if(p.dead){ ctx.translate(x+p.w/2, y+p.h/2); ctx.rotate(p.deadT*0.15); ctx.translate(-(x+p.w/2),-(y+p.h/2)); }
  // scudo
  if(p.shield){ ctx.strokeStyle='rgba(87,227,137,.8)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(x+p.w/2, y+p.h/2, p.h/2+8+Math.sin(frame*0.2)*2, 0, Math.PI*2); ctx.stroke(); }
  // corpo
  ctx.fillStyle = col; rr(x, y+4, p.w, p.h-4, 8);
  // pancia
  ctx.fillStyle = col2; rr(x+5, y+p.h*0.45, p.w-10, p.h*0.45, 6);
  // orecchie
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.moveTo(x+3,y+8); ctx.lineTo(x+8,y-6); ctx.lineTo(x+13,y+6); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+p.w-13,y+6); ctx.lineTo(x+p.w-8,y-6); ctx.lineTo(x+p.w-3,y+8); ctx.fill();
  // occhi
  const ex = p.face>0 ? 4 : -4;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(x+9+ex, y+14, 5, 0, Math.PI*2); ctx.arc(x+p.w-9+ex, y+14, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(x+9+ex+p.face*2, y+14, 2.4, 0, Math.PI*2); ctx.arc(x+p.w-9+ex+p.face*2, y+14, 2.4, 0, Math.PI*2); ctx.fill();
  // gambette
  if(!p.dead && p.onGround && Math.abs(p.vx)>0.5){
    const s = Math.sin(p.animT*2)*4;
    ctx.fillStyle=col;
    ctx.fillRect(x+4, y+p.h-3+s*0.5, 7, 5); ctx.fillRect(x+p.w-11, y+p.h-3-s*0.5, 7, 5);
  }
  // fiamma in mano
  if(p.flame && !p.dead){ ctx.fillStyle='#ff9f1c';
    ctx.beginPath(); ctx.arc(x+(p.face>0?p.w+3:-3), y+p.h*0.6, 4+Math.sin(frame*0.3)*1.5, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();
}
function drawEnemies(){
  for(const e of world.ents){
    const x = e.x-cam.x, y = e.y-cam.y;
    if(x<-160||x>W+160) continue;
    ctx.save();
    if(e.dead){ ctx.globalAlpha = Math.max(0,1-e.dead/40); ctx.translate(x+e.w/2,y+e.h/2); ctx.scale(1,-1); ctx.translate(-(x+e.w/2),-(y+e.h/2)); }
    if(e.type==='G'){
      // RE MELMONE
      if(e.flash>0 && frame%4<2) ctx.globalAlpha=0.4;
      const squish = e.onGround ? Math.sin(e.t*0.1)*4 : -8;
      ctx.fillStyle='#8a1538'; rr(x, y+squish, e.w, e.h-squish, 28);
      ctx.fillStyle='#c22853'; rr(x+12, y+24+squish*0.5, e.w-24, e.h-40, 20);
      // corona
      ctx.fillStyle='#ffd60a';
      ctx.beginPath();
      ctx.moveTo(x+28,y+squish); ctx.lineTo(x+34,y-18+squish); ctx.lineTo(x+44,y-4+squish);
      ctx.lineTo(x+55,y-20+squish); ctx.lineTo(x+66,y-4+squish); ctx.lineTo(x+76,y-18+squish);
      ctx.lineTo(x+82,y+squish); ctx.fill();
      // occhi cattivi
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(x+36,y+34+squish,9,0,Math.PI*2); ctx.arc(x+74,y+34+squish,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111';
      const dx = player.x>e.x?3:-3;
      ctx.beginPath(); ctx.arc(x+36+dx,y+35+squish,4,0,Math.PI*2); ctx.arc(x+74+dx,y+35+squish,4,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#111'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(x+26,y+22+squish); ctx.lineTo(x+44,y+28+squish);
      ctx.moveTo(x+84,y+22+squish); ctx.lineTo(x+66,y+28+squish); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+55,y+60+squish,12,0.2,Math.PI-0.2); ctx.stroke();
    } else if(e.type==='e'){
      ctx.fillStyle='#8d6a3f'; rr(x,y+6,e.w,e.h-6,10);
      ctx.fillStyle='#5c4327'; rr(x+3,y+e.h-8,8,8,3); rr(x+e.w-11,y+e.h-8,8,8,3);
      ctx.fillStyle='#fff'; ctx.beginPath();
      ctx.arc(x+9,y+14,4,0,Math.PI*2); ctx.arc(x+e.w-9,y+14,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.beginPath();
      ctx.arc(x+9+(e.vx<0?-1.5:1.5),y+14,2,0,Math.PI*2); ctx.arc(x+e.w-9+(e.vx<0?-1.5:1.5),y+14,2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#111'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x+e.w/2,y+22,5,0.3,Math.PI-0.3); ctx.stroke();
    } else if(e.type==='s'){
      ctx.fillStyle='#3d6b8c'; rr(x,y+8,e.w,e.h-8,8);
      ctx.fillStyle='#dbe7f0';
      for(let i=0;i<4;i++){ ctx.beginPath();
        ctx.moveTo(x+2+i*8,y+10); ctx.lineTo(x+6+i*8,y-4); ctx.lineTo(x+10+i*8,y+10); ctx.fill(); }
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+10,y+17,3.5,0,Math.PI*2); ctx.arc(x+e.w-10,y+17,3.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.fillRect(x+9,y+16,3,3); ctx.fillRect(x+e.w-12,y+16,3,3);
    } else if(e.type==='f'){
      ctx.fillStyle='#c0569c'; rr(x,y+4,e.w,e.h-8,12);
      const wing = Math.sin(e.t*0.4)*10;
      ctx.fillStyle='#e9a8d4';
      ctx.beginPath(); ctx.ellipse(x+4,y+8+wing*0.3,10,5,-0.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+e.w-4,y+8-wing*0.3,10,5,0.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+10,y+14,4,0,Math.PI*2); ctx.arc(x+e.w-10,y+14,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.fillRect(x+9,y+13,3,3); ctx.fillRect(x+e.w-12,y+13,3,3);
    } else if(e.type==='j'){
      const sq = e.onGround ? 4 : -4;
      ctx.fillStyle='#5eb04a'; rr(x,y+sq,e.w,e.h-sq,12);
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+10,y+12+sq,5,0,Math.PI*2); ctx.arc(x+e.w-10,y+12+sq,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(x+10,y+13+sq,2.5,0,Math.PI*2); ctx.arc(x+e.w-10,y+13+sq,2.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}
function drawStuff(){
  for(const it of world.items){
    const x = it.x-cam.x, y = it.y-cam.y;
    const info = ITEM_INFO[it.kind];
    ctx.fillStyle = info.col;
    if(it.kind==='stella'){
      ctx.save(); ctx.translate(x+14,y+14); ctx.rotate(frame*0.05);
      ctx.beginPath();
      for(let i=0;i<10;i++){ const r=i%2?7:15, a=i*Math.PI/5-Math.PI/2;
        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); }
      ctx.fill(); ctx.restore();
    } else if(it.kind==='piuma'){
      ctx.beginPath(); ctx.ellipse(x+14,y+14,7,15,0.6+Math.sin(frame*0.1)*0.15,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+8,y+24); ctx.lineTo(x+20,y+4); ctx.stroke();
    } else if(it.kind==='scudo'){
      ctx.beginPath(); ctx.arc(x+14,y+14,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#2a8a4a'; ctx.beginPath(); ctx.arc(x+14,y+14,7,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(x+14,y+16,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#3f7a2a'; rr(x+11,y+1,6,8,2);
      ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(x+9,y+11,3.5,0,Math.PI*2); ctx.fill();
    }
  }
  for(const f of world.fireballs){
    ctx.fillStyle='#ff9f1c'; ctx.beginPath();
    ctx.arc(f.x-cam.x+6, f.y-cam.y+6, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff3b0'; ctx.beginPath();
    ctx.arc(f.x-cam.x+6, f.y-cam.y+6, 3.5, 0, Math.PI*2); ctx.fill();
  }
  for(const p of particles){
    ctx.globalAlpha = Math.min(1, p.life/20);

  }
  ctx.globalAlpha = 1;
  ctx.textAlign='center'; ctx.font='bold 16px Courier New';
  for(const f of floats){
    ctx.globalAlpha = Math.min(1, f.life/25);
    ctx.fillStyle = f.col; ctx.fillText(f.txt, f.x-cam.x, f.y-cam.y);
  }
  ctx.globalAlpha = 1;
}
function drawHUD(){

  ctx.font='bold 18px Courier New'; ctx.textAlign='left'; ctx.fillStyle='#fff';

  ctx.fillStyle='#ffd94a'; ctx.fillText('◉ '+coins, 150, 29);
  ctx.fillStyle='#fff'; ctx.fillText('PUNTI '+score, 250, 29);
  ctx.textAlign='right';
  ctx.fillText('⏱ '+Math.ceil(timeLeft/60), W-16, 29);
  ctx.textAlign='center'; ctx.fillStyle='#9ae6ff';
  ctx.fillText(LEVELS[levelIdx].name, W/2+80, 29);
  // power-up attivi
  let px = 460; ctx.textAlign='left'; ctx.font='bold 14px Courier New';
  const tags = [];
  if(player.big) tags.push(['GIGANTE','#ff4d6d']);
  if(player.flame) tags.push(['FIAMMA','#ff9f1c']);
  if(player.feather) tags.push(['PIUMA','#4cc9f0']);
  if(player.shield) tags.push(['SCUDO','#57e389']);
  if(player.star>0) tags.push(['STELLA '+Math.ceil(player.star/60),'#ffd60a']);
  // barra vita boss
  const b = world.boss;
  if(b && !b.dead && world.cfg.boss){
    ctx.fillStyle='rgba(0,0,0,.5)'; rr(W/2-160, 54, 320, 26, 8);
    ctx.fillStyle='#c22853'; rr(W/2-155, 58, 310*(b.hp/b.maxhp), 18, 6);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold 14px Courier New';
    ctx.fillText('RE MELMONE', W/2, 72);
  }
  // riga power-up sotto HUD
  ctx.font='bold 14px Courier New'; ctx.textAlign='left';
  let sx = 16;
  for(const [t,c] of tags){
    ctx.fillStyle='rgba(0,0,0,.35)';
    const wTag = ctx.measureText(t).width+16;
    rr(sx, 50, wTag, 22, 6);
    ctx.fillStyle=c; ctx.fillText(t, sx+8, 66);
    sx += wTag+8;
  }
}

/* ============================= SCHERMATE ============================= */
function drawMenu(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a0f2e'); g.addColorStop(1,'#3d1f5c');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(let i=0;i<40;i++){ ctx.fillStyle='rgba(255,255,255,'+(0.2+((i*37)%60)/100)+')';
    ctx.fillRect((i*211+frame*0.2)%W, (i*97)%H, 2, 2); }
  ctx.textAlign='center';
  ctx.font='bold 58px Courier New';
  ctx.fillStyle='#ffd60a';
  ctx.fillText('SUPER BALDO', W/2, 105+Math.sin(frame*0.05)*5);
  ctx.font='bold 20px Courier New'; ctx.fillStyle='#ff9de0';
  ctx.fillText('~ Il Regno delle Bacche ~', W/2, 140);
  ctx.font='16px Courier New'; ctx.fillStyle='#9ae6ff';
  ctx.fillText('Scegli il tuo eroe  (◀ ▶ poi SPAZIO / tocca)', W/2, 185);
  // card personaggi
  for(let i=0;i<3;i++){
    const c = CHARS[i];
    const cx = W/2 + (i-1)*250, cy = 300;
    const sel = i===charIdx;
    ctx.fillStyle = sel ? 'rgba(255,214,10,.18)' : 'rgba(255,255,255,.06)';
    rr(cx-105, cy-85, 210, 200, 16);
    if(sel){ ctx.strokeStyle='#ffd60a'; ctx.lineWidth=3;
      ctx.strokeRect(cx-105, cy-85, 210, 200); }
    // mini personaggio
    const bob = sel ? Math.sin(frame*0.1)*6 : 0;
    ctx.fillStyle=c.color; rr(cx-22, cy-40+bob, 44, 52, 12);
    ctx.fillStyle=c.color2; rr(cx-14, cy-14+bob, 28, 24, 8);
    ctx.fillStyle=c.color;
    ctx.beginPath(); ctx.moveTo(cx-18,cy-36+bob); ctx.lineTo(cx-11,cy-56+bob); ctx.lineTo(cx-4,cy-38+bob); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+4,cy-38+bob); ctx.lineTo(cx+11,cy-56+bob); ctx.lineTo(cx+18,cy-36+bob); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(cx-8,cy-24+bob,6,0,Math.PI*2); ctx.arc(cx+8,cy-24+bob,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(cx-7,cy-24+bob,3,0,Math.PI*2); ctx.arc(cx+9,cy-24+bob,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = sel?'#ffd60a':'#fff'; ctx.font='bold 22px Courier New';
    ctx.fillText(c.name, cx, cy+45);
    ctx.font='13px Courier New'; ctx.fillStyle='#cbd5e1';
    wrapText(c.desc, cx, cy+70, 190, 16);
    // statistiche
    drawStat(cx-80, cy+95, 'VEL', c.speed/1.4);
    drawStat(cx+10, cy+95, 'SALTO', c.jump/1.1);
  }
  ctx.font='bold 22px Courier New'; ctx.fillStyle='#7dff8a';
  ctx.fillText('PREMI SPAZIO PER INIZIARE', W/2, 490+Math.sin(frame*0.1)*3);
  ctx.font='13px Courier New'; ctx.fillStyle='#8899aa';
  ctx.fillText('← → muovi · SPAZIO salta · X fiamma · Rompi i blocchi ★ e ♦!', W/2, 520);
}
function drawStat(x,y,label,v){
  ctx.textAlign='left'; ctx.font='11px Courier New'; ctx.fillStyle='#8899aa';
  ctx.fillText(label,x,y);
  ctx.fillStyle='rgba(255,255,255,.15)'; rr(x,y+4,70,7,3);
  ctx.fillStyle='#4cc9f0'; rr(x,y+4,70*Math.min(1,v),7,3);
  ctx.textAlign='center';
}
function wrapText(t,x,y,mw,lh){
  const words=t.split(' '); let line='', yy=y;
  for(const w of words){ const test=line+w+' ';
    if(ctx.measureText(test).width>mw){ ctx.fillText(line,x,yy); line=w+' '; yy+=lh; }
    else line=test; }
  ctx.fillText(line,x,yy);
}
function overlayScreen(title, sub, col){
  ctx.fillStyle='rgba(0,0,0,.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 52px Courier New'; ctx.fillStyle=col;
  ctx.fillText(title, W/2, H/2-40);
  ctx.font='20px Courier New'; ctx.fillStyle='#fff';
  ctx.fillText(sub, W/2, H/2+10);
  ctx.font='bold 18px Courier New'; ctx.fillStyle='#7dff8a';
  ctx.fillText('PREMI SPAZIO', W/2, H/2+60+Math.sin(frame*0.1)*3);
}

/* ============================= UI HANDLERS ============================= */
function handleUIKey(k){
  if(state==='MENU'){
    if(k==='ArrowLeft') { charIdx=(charIdx+2)%3; SFX.coin(); }
    if(k==='ArrowRight'){ charIdx=(charIdx+1)%3; SFX.coin(); }
    if(k===' '){ score=0; coins=0; lives=3; player=null; startLevel(0); }
  } else if(state==='CLEAR' && k===' ' && clearTimer>40){
    if(levelIdx+1<LEVELS.length) startLevel(levelIdx+1); else state='WIN';
  } else if(state==='GAMEOVER' && k===' '){ state='MENU'; }
  else if(state==='WIN' && k===' '){ state='MENU'; }
}
function handleClick(mx,my){
  if(state==='MENU'){
    for(let i=0;i<3;i++){
      const cx = W/2+(i-1)*250;
      if(mx>cx-105&&mx<cx+105&&my>215&&my<415){
        if(charIdx===i){ score=0; coins=0; lives=3; player=null; startLevel(0); }
        else { charIdx=i; SFX.coin(); }
        return;
      }
    }
    if(my>440){ score=0; coins=0; lives=3; player=null; startLevel(0); }
  } else handleUIKey(' ');
}

/* ============================= LOOP ============================= */
function tick(){
  frame++;
  if(state==='PLAY'){
    timeLeft--;
    if(timeLeft<=0) killPlayer();
    updatePlayer(); updateEnemies(); updateStuff(); updateCam();
  } else if(state==='CLEAR'){ clearTimer++; updateStuff();
    player.vx=0; player.x += 1.5; player.animT+=0.3; updateCam(); }
  // render
  ctx.save();
  if(shake>0){ shake--; ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake); }
  if(state==='MENU'){ drawMenu(); }
  else {
    drawSky(world.cfg); drawTiles(); drawStuff(); drawEnemies(); drawPlayer(); drawHUD();
    if(state==='CLEAR') overlayScreen('LIVELLO COMPLETATO!', 'Bonus tempo: +'+Math.floor(timeLeft/60)*10+' punti', '#ffd60a');
    if(state==='GAMEOVER') overlayScreen('GAME OVER', 'Punteggio finale: '+score, '#ff4d6d');
    if(state==='WIN') overlayScreen('★ HAI VINTO! ★', 'Re Melmone è sconfitto! Punti: '+score, '#7dff8a');
  }
  ctx.restore();
  requestAnimationFrame(tick);
}
tick();
</script>
